function getSalesWeightedCost(stores, fw, costField) {
  let totalCostDollars = 0, totalSales = 0;
  stores.forEach(store => {
    const c = S.computed.costs[store]?.[fw];
    const st = S.computed.storeTotals[store]?.[fw];
    if (c && c[costField] != null && st && st.sales > 0) {
      totalCostDollars += c[costField] * st.sales;
      totalSales += st.sales;
    }
  });
  return totalSales > 0 ? totalCostDollars / totalSales : null;
}

function getPeriodTotals(period) {
  const periodWeeks = S.data.availableWeeks.filter(w => S.data.weekToPeriod[w] === period);
  if (!periodWeeks.length) return null;
  const allStores = S.data.stores.map(s => s.name);
  let sales = 0, orders = 0;
  periodWeeks.forEach(w => {
    allStores.forEach(store => {
      const st = S.computed.storeTotals[store]?.[w];
      if (st) { sales += st.sales; orders += st.orders; }
    });
  });
  const avgCheck = orders > 0 ? sales / orders : 0;
  const perNum = parseInt(period.replace('P', ''));
  const pyRows = S.data.priorYear.filter(r => r.period === perNum && r.type === 'Destination');
  const pySales = pyRows.reduce((s, r) => s + (r.sales || 0), 0);
  const pyOrders = pyRows.reduce((s, r) => s + (r.orders || 0), 0);
  const eb = S.computed.ebitda[period];
  const lastWeek = periodWeeks[periodWeeks.length - 1];
  const guestScores = allStores.map(store => S.computed.guestHealth[store]?.[lastWeek]?.smoothed).filter(s => s != null);
  const avgGuestScore = guestScores.length > 0 ? Math.round(guestScores.reduce((a, b) => a + b, 0) / guestScores.length) : null;
  return {
    period, weeks: periodWeeks.length, sales, orders, avgCheck,
    pySales, pyOrders, pyAvgCheck: pyOrders > 0 ? pySales / pyOrders : 0,
    salesYoY: pySales > 0 ? (sales - pySales) / pySales : null,
    ordersYoY: pyOrders > 0 ? (orders - pyOrders) / pyOrders : null,
    foodCostPct: eb?.revenue > 0 ? eb.foodCost / eb.revenue : null,
    laborPct: eb?.revenue > 0 ? eb.allInLabor / eb.revenue : null,
    ebitdaPct: eb?.ebitda && eb.revenue > 0 ? eb.ebitda / eb.revenue : null,
    guestScore: avgGuestScore
  };
}

function renderTraffic() {
  const fw = S.week;
  const ch = S.computed.channels[fw];
  const agg = getAgg(fw);
  const chPrev = S.computed.channels[fw - 1];

  // ── Section 1: KPI Tiles ──
  const dinein = ch?.destination?.['Dine-in'];
  const mkt = ch?.destination?.['Marketplace'];
  const cat = ch?.destination?.['Catering'];
  let html = `<div class="kpi-row">`;
  html += kpiTile({label:'Total Orders', value:(agg?.orders||0).toLocaleString(), wowChange:agg?.ordersWoW, yoyChange:agg?.ordersYoY});
  // Compute Dine-in YoY from brand history
  const dineinBh25 = S.data.brandHistory.filter(r => r.fiscalYear === 2025 && r.fw === fw && r.type === 'Destination' && r.cat === 'Dine-in');
  const dineinPyOrders = dineinBh25.reduce((s,r) => s + (r.orders||0), 0);
  const dineinYoY = dineinPyOrders > 0 && dinein ? (dinein.orders - dineinPyOrders) / dineinPyOrders : null;
  html += kpiTile({label:'Dine-in Orders', value:(dinein?.orders||0).toLocaleString(), wowChange:dinein?.ordersWoW, yoyChange:dineinYoY});
  html += kpiTile({label:'Marketplace Orders', value:(mkt?.orders||0).toLocaleString(), wowChange:mkt?.ordersWoW});
  html += kpiTile({label:'Catering Revenue', value:fmt$(cat?.sales), wowChange:cat?.salesWoW, subtitle:`${(cat?.orders||0).toLocaleString()} orders this week`});
  html += `</div>`;

  // ── Section 2: Destination Channels Table ──
  // Build YoY from brandHistory
  const destChannels = CONFIG.destinationChannels.map(c => {
    const d = ch?.destination?.[c] || {};
    if (!d.orders && !d.sales) return null;
    // YoY from Brand_Weekly_History
    const bh25 = S.data.brandHistory.filter(r => r.fiscalYear === 2025 && r.fw === fw && r.type === 'Destination' && r.cat === c);
    const pyOrders = bh25.reduce((s,r) => s + (r.orders||0), 0);
    const yoyOrders = pyOrders > 0 ? (d.orders - pyOrders) / pyOrders : null;
    return {channel:c, sales:d.sales||0, orders:d.orders||0, shareOfOrders:d.shareOfOrders||0, avgCheck:d.avgCheck||0, salesWoW:d.salesWoW, ordersWoW:d.ordersWoW, yoyOrders};
  }).filter(Boolean);
  destChannels.sort((a,b) => b.orders - a.orders);

  html += `<div class="card"><div class="card-title">Destination Channels — Week ${fw}</div>`;
  html += sortableTable({
    id:'traffic-dest', headers:[
      {key:'channel',label:'Channel',width:'140px'},
      {key:'sales',label:'Sales',format:'currency',sortable:true},
      {key:'orders',label:'Orders',format:'number',sortable:true},
      {key:'shareOfOrders',label:'Order Share',format:'percent',sortable:true},
      {key:'avgCheck',label:'Avg Check',format:'currency',sortable:true},
      {key:'salesWoW',label:'Sales WoW',format:'changePct',sortable:true},
      {key:'ordersWoW',label:'Orders WoW',format:'changePct',sortable:true},
      {key:'yoyOrders',label:'YoY Orders',format:'changePct',sortable:true}
    ],
    rows: destChannels,
    defaultSort:{key:'orders',dir:'desc'}
  });
  // Biggest mover
  let biggestMover = null, biggestAbs = 0;
  destChannels.forEach(d => {
    const prev = chPrev?.destination?.[d.channel];
    if (prev) {
      const absChange = Math.abs(d.orders - prev.orders);
      if (absChange > biggestAbs) { biggestAbs = absChange; biggestMover = {channel:d.channel, change:d.orders - prev.orders, pct:d.ordersWoW}; }
    }
  });
  if (biggestMover) {
    const sign = biggestMover.change > 0 ? '+' : '';
    html += `<div style="font-size:12px;color:var(--muted);padding:6px 10px">Biggest mover: ${biggestMover.channel} ${sign}${biggestMover.change} orders (${fmtChg(biggestMover.pct)})</div>`;
  }
  html += '</div>';

  // ── Section 3: Daypart Distribution Table ──
  const dpData = CONFIG.allDayparts.map(dp => {
    const d = ch?.daypart?.[dp] || {};
    return {daypart:dp, label:CONFIG.daypartLabels[dp]||dp, sales:d.sales||0, orders:d.orders||0, shareOfOrders:d.shareOfOrders||0, avgCheck:d.avgCheck||0, salesWoW:d.salesWoW, ordersWoW:d.ordersWoW};
  }).sort((a,b) => b.sales - a.sales);

  html += `<div class="card"><div class="card-title">Daypart Distribution — Week ${fw}</div>`;
  html += sortableTable({
    id:'traffic-dayparts', headers:[
      {key:'label',label:'Daypart',width:'160px'},
      {key:'sales',label:'Sales',format:'currency',sortable:true},
      {key:'orders',label:'Orders',format:'number',sortable:true},
      {key:'shareOfOrders',label:'Order Share',format:'percent',sortable:true},
      {key:'avgCheck',label:'Avg Check',format:'currency',sortable:true},
      {key:'salesWoW',label:'Sales WoW',format:'changePct',sortable:true},
      {key:'ordersWoW',label:'Orders WoW',format:'changePct',sortable:true}
    ],
    rows: dpData,
    defaultSort:{key:'sales',dir:'desc'}
  });
  html += '</div>';

  // ── Section 4: Channel × Daypart — Side by Side Bar Charts ──
  html += `<div class="chart-row">`;
  // Left: Destination WoW Change
  html += `<div class="card"><div class="card-title">Destination WoW Change</div>`;
  html += `<div style="position:relative;height:200px"><canvas id="traffic-dest-wow"></canvas></div></div>`;
  // Right: Daypart WoW Change
  html += `<div class="card"><div class="card-title">Daypart WoW Change</div>`;
  html += `<div style="position:relative;height:200px"><canvas id="traffic-dp-wow"></canvas></div></div>`;
  html += `</div>`;

  // ── Section 5: 6-Week Channel Trends ──
  html += `<div class="chart-row">`;
  html += `<div class="card"><div class="card-title">Destination Trends — Last 6 Weeks</div>`;
  html += `<div style="position:relative;height:220px"><canvas id="traffic-dest-trend"></canvas></div></div>`;
  html += `<div class="card"><div class="card-title">Daypart Trends — Last 6 Weeks</div>`;
  html += `<div style="position:relative;height:220px"><canvas id="traffic-dp-trend"></canvas></div></div>`;
  html += `</div>`;

  // ── Section 6: Avg Check by Channel ──
  const matChannels = CONFIG.materialChannels;
  html += `<div class="card"><div class="card-title">Avg Check by Channel — Week ${fw}</div>`;
  html += `<div class="kpi-row">`;
  matChannels.forEach(c => {
    const d = ch?.destination?.[c];
    html += kpiTile({label:c, value:fmt$(d?.avgCheck), wowChange:d?.checkWoW});
  });
  html += `</div></div>`;

  document.getElementById('content').innerHTML = html;

  // ── Render Charts (after DOM update) ──
  setTimeout(() => {
    // Dest WoW bar chart
    const destWowChannels = matChannels.filter(c => ch?.destination?.[c]?.ordersWoW != null);
    const destWowLabels = destWowChannels;
    const destWowData = destWowChannels.map(c => (ch.destination[c].ordersWoW || 0) * 100);
    const destWowColors = destWowData.map(v => v >= 0 ? resolveColor('var(--green)') : resolveColor('var(--red)'));
    createBarChart('traffic-dest-wow', {
      horizontal: true,
      labels: destWowLabels,
      datasets: [{label:'Orders WoW %', data:destWowData, colors:destWowColors}],
      yAxisFormat: 'number',
      showLegend: false
    });

    // Daypart WoW bar chart
    const dpWowParts = CONFIG.dayparts;
    const dpWowData = dpWowParts.map(dp => ((ch?.daypart?.[dp]?.ordersWoW) || 0) * 100);
    const dpWowColors = dpWowData.map(v => v >= 0 ? resolveColor('var(--green)') : resolveColor('var(--red)'));
    createBarChart('traffic-dp-wow', {
      horizontal: true,
      labels: dpWowParts.map(dp => CONFIG.daypartLabels[dp] || dp),
      datasets: [{label:'Orders WoW %', data:dpWowData, colors:dpWowColors}],
      yAxisFormat: 'number',
      showLegend: false
    });

    // 6-week dest trends
    const recentWeeks = S.data.availableWeeks.slice(-6);
    const wLabels = recentWeeks.map(w => 'W'+w);
    // Top 3 dest channels by current orders
    const top3Dest = [...destChannels].sort((a,b) => b.orders - a.orders).slice(0, 3);
    const destColors = ['var(--chart-2026)', 'var(--brown-light)', 'var(--muted)'];
    const destStyles = ['solid', 'solid', 'dashed'];
    const destDatasets = top3Dest.map((c, i) => ({
      label: c.channel,
      data: recentWeeks.map(w => S.computed.channels[w]?.destination?.[c.channel]?.orders || 0),
      color: destColors[i], style: destStyles[i]
    }));
    // Add 2025 comparison for top channel if available
    if (top3Dest.length) {
      const topCh = top3Dest[0].channel;
      const has2025 = recentWeeks.some(w => {
        const bh = S.data.brandHistory.filter(r => r.fiscalYear === 2025 && r.fw === w && r.type === 'Destination' && r.cat === topCh);
        return bh.length > 0;
      });
      if (has2025) {
        destDatasets.push({
          label: topCh + ' 2025',
          data: recentWeeks.map(w => {
            const bh = S.data.brandHistory.filter(r => r.fiscalYear === 2025 && r.fw === w && r.type === 'Destination' && r.cat === topCh);
            return bh.reduce((s,r) => s + (r.orders||0), 0) || null;
          }),
          color: 'var(--chart-2025)', style: 'dashed'
        });
      }
    }
    createTrendChart('traffic-dest-trend', {
      labels: wLabels, datasets: destDatasets,
      yAxisFormat: 'number', yAxisLabel: 'Orders', showLegend: true
    });

    // 6-week daypart trends
    const dpDatasets = CONFIG.dayparts.map((dp, i) => ({
      label: CONFIG.daypartLabels[dp] || dp,
      data: recentWeeks.map(w => S.computed.channels[w]?.daypart?.[dp]?.orders || 0),
      color: destColors[i], style: destStyles[i]
    }));
    createTrendChart('traffic-dp-trend', {
      labels: wLabels, datasets: dpDatasets,
      yAxisFormat: 'number', yAxisLabel: 'Orders', showLegend: true
    });
  }, 0);
}

function renderScorecard() {
  const fw = S.week;
  const stores = getStores();
  const storeCount = stores.length;
  let html = '';

  // ── Section A: Rankings Table ──
  html += `<div class="card"><div class="card-title">Store Rankings — Week ${fw}</div>`;
  const rankData = (S.computed.rankings[fw] || []).filter(r => stores.includes(r.store));
  const RD = CONFIG.rankDimensions;
  html += sortableTable({
    id:'scorecard-rank-table',
    headers:[
      {key:'rank',label:'Rank',format:'rank',width:'50px',align:'center'},
      {key:'store',label:'Store',width:'120px'},
      {key:'compositeScore',label:'Composite',width:'70px',align:'center',sortable:true},
      {key:'sm',label:'SM',width:'70px'},
      {key:'td',label:'TD',width:'70px'},
      {key:'cd',label:'CD',width:'70px'},
      {key:'gh',label:'GH',width:'70px'},
      {key:'bp',label:'BP',width:'70px'},
      {key:'sales',label:'Sales',format:'currency',sortable:true},
      {key:'ordersWoW',label:'Orders WoW',format:'changePct',sortable:true},
      {key:'signal',label:'Signal',format:'signal',width:'120px'}
    ],
    rows: rankData.map(r => {
      const st = S.computed.storeTotals[r.store]?.[fw] || {};
      const d = r.dimensions || {};
      return {
        store:r.store, district:r.district, rank:r.rank, compositeScore:r.compositeScore,
        sm: dimensionBar(d.salesMomentum, RD.salesMomentum.max),
        td: dimensionBar(d.trafficDirection, RD.trafficDirection.max),
        cd: dimensionBar(d.costDiscipline, RD.costDiscipline.max),
        gh: dimensionBar(d.guestHealth, RD.guestHealth.max),
        bp: dimensionBar(d.budgetPace, RD.budgetPace.max),
        sales:st.sales, ordersWoW:st.ordersWoW, signal:st.signal
      };
    }),
    groupBy:'district', groupOrder:Object.keys(CONFIG.districts),
    defaultSort:{key:'rank',dir:'asc'},
    onRowClick: scorecardRowClick,
    highlightRow: r => r.store === S.store
  });
  html += `</div>`;

  if (!S.store) {
    html += `<div class="card" style="text-align:center;color:var(--muted);padding:30px">Click any store to see the full diagnostic.</div>`;
  }

  // ── Section B: Store Deep Dive ──
  if (S.store && stores.includes(S.store)) {
    const store = S.store;
    const st = S.computed.storeTotals[store]?.[fw] || {};
    const rank = (S.computed.rankings[fw] || []).find(r => r.store === store);
    const bp = S.computed.budgetPacing[store];
    const gh = S.computed.guestHealth[store]?.[fw];
    const cost = S.computed.costs[store]?.[fw];
    const sc = S.computed.storeChannels[store]?.[fw];
    const per = S.data.currentPeriod;

    // ── B1: Headline Narrative ──
    html += `<div class="dive-card"><div class="dive-title"><span>${store} — Detailed Diagnostic</span><button class="dive-close" onclick="S.store=null;renderScorecard()">✕</button></div>`;
    html += `<div class="narrative-card">${buildNarrative(store, fw)}</div>`;
    html += `</div>`;

    // ── B2: KPI Tiles ──
    html += `<div class="kpi-row">`;
    html += kpiTile({label:'Sales', value:fmt$(st.sales), wowChange:st.salesWoW, yoyChange:st.salesYoY});
    html += kpiTile({label:'Orders', value:(st.orders||0).toLocaleString(), wowChange:st.ordersWoW, yoyChange:st.ordersYoY});
    html += kpiTile({label:'Avg Check', value:fmt$(st.avgCheck), wowChange:st.checkWoW, yoyChange:st.checkYoY});
    html += kpiTile({label:'Composite Rank', value:`#${rank?.rank||'—'} / ${storeCount}`, subtitle:`Score: ${rank?.compositeScore||'—'}`});
    html += `</div>`;
    html += `<div class="card" style="padding:8px 20px">${buildDecompSentence(st)}</div>`;

    // ── B3: 6-Week Trend Charts ──
    const recentWeeks = S.data.availableWeeks.slice(-6);
    const chartLabels = recentWeeks.map(w => 'W'+w);
    html += `<div class="chart-row">`;
    html += `<div class="card"><div class="card-title">Sales — ${store} vs Brand Avg</div><div style="position:relative;height:200px"><canvas id="sc-sales-trend"></canvas></div></div>`;
    html += `<div class="card"><div class="card-title">Orders — ${store} vs Brand Avg</div><div style="position:relative;height:200px"><canvas id="sc-orders-trend"></canvas></div></div>`;
    html += `</div>`;

    // ── B4: Channel Decomposition ──
    if (st.salesWoW != null && sc) {
      html += `<div class="card"><div class="card-title">What's Driving the Change</div>`;
      // Destinations
      const destChannels = CONFIG.destinationChannels.map(ch => {
        const d = sc.destination?.[ch] || {};
        const priorSales = S.computed.storeChannels[store]?.[fw-1]?.destination?.[ch]?.sales || 0;
        const dollarChange = (d.sales||0) - priorSales;
        return {channel:ch, sales:d.sales||0, dollarChange, salesWoW:d.salesWoW, contrib:d.contributionToStoreChange||0};
      }).filter(r => r.sales > 0 || Math.abs(r.dollarChange) > 0).sort((a,b) => Math.abs(b.contrib) - Math.abs(a.contrib));

      if (destChannels.length) {
        html += `<div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Destinations</div>`;
        html += `<div class="table-wrap"><table class="data-table"><thead><tr><th>Channel</th><th>This Week Sales</th><th>WoW Change</th><th>Contribution</th></tr></thead><tbody>`;
        const topContrib = destChannels[0];
        destChannels.forEach(r => {
          const isBold = r.channel === topContrib.channel ? 'font-weight:700' : '';
          html += `<tr><td style="${isBold}">${r.channel}</td><td>${fmt$(r.sales)}</td>`;
          html += `<td><span style="color:${chgColor(r.salesWoW)}">${fmt$(r.dollarChange)} (${fmtChg(r.salesWoW)})</span></td>`;
          html += `<td style="${isBold};color:${chgColor(r.contrib)}">${fmtPct(Math.abs(r.contrib))}</td></tr>`;
        });
        html += `</tbody></table></div>`;
        if (topContrib) {
          html += `<div style="font-size:12px;color:var(--muted);padding:6px 0">${topContrib.channel} accounts for ${fmtPct(Math.abs(topContrib.contrib))} of this week's sales change (${fmt$(topContrib.dollarChange)})</div>`;
        }
      }

      // Dayparts
      const daypartData = CONFIG.allDayparts.map(dp => {
        const d = sc.daypart?.[dp] || {};
        const storeOrders = st.orders || 1;
        return {daypart: CONFIG.daypartLabels[dp] || dp, sales:d.sales||0, orders:d.orders||0, shareOfOrders: storeOrders > 0 ? (d.orders||0)/storeOrders : 0};
      }).filter(r => r.orders > 0).sort((a,b) => b.sales - a.sales);

      if (daypartData.length) {
        html += `<div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:12px 0 8px">Dayparts</div>`;
        html += `<div class="table-wrap"><table class="data-table"><thead><tr><th>Daypart</th><th>This Week Sales</th><th>Orders</th><th>Share of Orders</th></tr></thead><tbody>`;
        daypartData.forEach(r => {
          html += `<tr><td>${r.daypart}</td><td>${fmt$(r.sales)}</td><td>${r.orders.toLocaleString()}</td><td>${fmtPct(r.shareOfOrders)}</td></tr>`;
        });
        html += `</tbody></table></div>`;
      }
      html += `</div>`;
    }

    // ── B5: Controllable Costs ──
    html += `<div class="card"><div class="card-title">Cost Management — Week ${fw}</div>`;
    html += `<div class="kpi-row">`;
    // Food Cost
    const foodActual = cost?.foodCostPct;
    const foodBudget = cost?.budgetFoodCostPct;
    const foodVarD = cost?.foodCostVarianceDollars;
    let foodSub = '';
    if (foodBudget != null) foodSub += `Budget: ${fmtPct(foodBudget)}`;
    if (foodVarD != null) {
      const over = foodVarD > 0;
      foodSub += `<br><span style="color:${over?'var(--red)':'var(--green)'}">${over?'+':''}${fmt$(foodVarD)} ${over?'over':'under'} budget</span>`;
    }
    html += kpiTile({label:'Food Cost %', value:fmtPct(foodActual), subtitle:foodSub});

    // Labor Cost
    const laborActual = cost?.laborCostPct;
    const laborBudget = cost?.budgetAllInLaborPct;
    const laborVarD = cost?.laborCostVarianceDollars;
    let laborSub = '';
    if (laborBudget != null) laborSub += `Budget: ${fmtPct(laborBudget)}`;
    if (laborVarD != null) {
      const over = laborVarD > 0;
      laborSub += `<br><span style="color:${over?'var(--red)':'var(--green)'}">${over?'+':''}${fmt$(laborVarD)} ${over?'over':'under'} budget</span>`;
    }
    html += kpiTile({label:'Labor Cost %', value:fmtPct(laborActual), subtitle:laborSub});

    // SPLH
    const brandSales = S.computed.brandTotals[fw]?.sales || 0;
    const brandHours = S.data.stores.reduce((sum, s) => sum + (S.computed.costs[s.name]?.[fw]?.hoursWorked || 0), 0);
    const brandSplh = brandHours > 0 ? brandSales / brandHours : 0;
    const splhColor = cost?.splh != null && brandSplh > 0 ? (cost.splh >= brandSplh ? 'var(--green)' : 'var(--red)') : 'var(--muted)';
    html += kpiTile({label:'SPLH', value:cost?.splh != null ? fmt$(cost.splh) : '—', subtitle:`Brand avg: ${fmt$(brandSplh)}<br><span style="color:${splhColor}">${cost?.splh >= brandSplh ? 'Above' : 'Below'} brand avg</span>`});

    // Hours Worked
    html += kpiTile({label:'Hours Worked', value:cost?.hoursWorked != null ? Math.round(cost.hoursWorked).toLocaleString() : '—'});
    html += `</div>`;

    // Cost narrative
    let costNarr = '';
    if (cost?.foodCostVariancePct != null && cost.foodCostVariancePct > 0.005) {
      costNarr += `Food cost is running ${fmtPct(cost.foodCostVariancePct)} over budget — costing an additional ${fmt$(Math.abs(cost.foodCostVarianceDollars||0))} per week. `;
    }
    if (cost?.laborCostVariancePct != null && cost.laborCostVariancePct > 0.005 && laborBudget != null) {
      costNarr += `All-in labor at ${fmtPct(laborActual)} vs ${fmtPct(laborBudget)} budget — ${fmt$(Math.abs(laborVarD||0))} over per week.`;
    }
    if (!costNarr) costNarr = 'Both food and labor costs are within budget thresholds.';
    html += `<div class="cost-narrative">${costNarr}</div>`;
    html += `</div>`;

    // ── B6: Guest Health ──
    html += `<div class="card"><div class="card-title">Guest Sentiment — ${store}</div>`;
    if (!gh) {
      html += `<div style="color:var(--muted);padding:10px 0">No review data available for this week.</div>`;
    } else {
      html += `<div class="kpi-row">`;
      let ghSub = '';
      if (gh.raw !== gh.smoothed) ghSub += `Raw this week: ${gh.raw}`;
      if (gh.ptd != null) ghSub += `${ghSub ? ' · ' : ''}${gh.ptd} PTD avg`;
      html += kpiTile({label:'Guest Score', value:`<span style="color:${guestScoreColor(gh.smoothed)}">${gh.smoothed}</span>`, subtitle:ghSub});
      const ratingColor = gh.data.avgRating >= 4.3 ? 'var(--green)' : gh.data.avgRating >= 4.0 ? 'var(--yellow)' : 'var(--red)';
      html += kpiTile({label:'Avg Rating', value:`<span style="color:${ratingColor}">${gh.data.avgRating.toFixed(1)}</span>`});
      const lowPctColor = gh.data.lowPct < 0.15 ? 'var(--green)' : gh.data.lowPct < 0.25 ? 'var(--yellow)' : 'var(--red)';
      html += kpiTile({label:'Low Reviews', value:`${gh.data.lowReviews} / ${gh.data.totalReviews}`, subtitle:`<span style="color:${lowPctColor}">${fmtPct(gh.data.lowPct)} of reviews are 1-3 stars</span>`});
      html += `</div>`;

      // Leading indicator check
      const ghScores = [];
      for (let i = 0; i <= 3; i++) {
        const g = S.computed.guestHealth[store]?.[fw-i];
        if (g?.smoothed != null) ghScores.push(g.smoothed); else break;
      }
      const declining = ghScores.length >= 2 && ghScores.every((s,i) => i === 0 || s <= ghScores[i-1]);
      if (declining && gh.smoothed < 75 && ghScores.length >= 2) {
        html += `<div class="leading-warn">⚠ Guest score has declined for ${ghScores.length} consecutive weeks (from ${ghScores[ghScores.length-1]} to ${ghScores[0]}). Historical pattern suggests order impact within 1-2 weeks.</div>`;
      } else if (gh.smoothed >= 75) {
        html += `<div class="leading-ok">Guest sentiment stable — no leading indicator concern.</div>`;
      }

      // 10-week guest health chart
      const ghWeeks = S.data.availableWeeks.slice(-10);
      html += `<div style="position:relative;height:160px;margin-top:8px"><canvas id="sc-guest-trend"></canvas></div>`;
    }
    html += `</div>`;

    // ── B7: Period Context ──
    if (bp) {
      html += `<div class="card"><div class="card-title">Period Performance — ${per}</div>`;
      html += `<div class="kpi-row">`;
      const budgetPTD = bp.periodBudget * (bp.weeksElapsed / CONFIG.weeksPerPeriod);
      const varColor = bp.variance >= 0 ? 'var(--green)' : 'var(--red)';
      html += kpiTile({label:'PTD Sales', value:fmt$(bp.ptdSales), subtitle:`Budget: ${fmt$(budgetPTD)}<br><span style="color:${varColor}">Variance: ${bp.variance >= 0 ? '+' : ''}${fmt$(bp.variance)}</span>`});
      html += kpiTile({label:'Budget Pace', value:bp.onPace ? `<span style="color:var(--green)">On Pace ✓</span>` : `<span style="color:var(--red)">Behind Pace</span>`, subtitle:bp.weeksRemaining > 0 ? `Need ${fmt$(bp.weeklyRunRateNeeded)}/week for remaining ${bp.weeksRemaining} week${bp.weeksRemaining>1?'s':''}` : 'Period complete'});
      const pyPTD = bp.priorYearPTD;
      const yoyPTDChg = pyPTD > 0 ? (bp.ptdSales - pyPTD) / pyPTD : null;
      html += kpiTile({label:'Prior Year PTD', value:fmt$(pyPTD), subtitle:yoyPTDChg != null ? `<span style="color:${chgColor(yoyPTDChg)}">YoY: ${fmtChg(yoyPTDChg)}</span>` : ''});
      html += `</div></div>`;
    }

    }

  document.getElementById('content').innerHTML = html;

  // Charts need to be rendered after DOM update
  if (S.store && stores.includes(S.store)) {
    const store = S.store;
    const storeCountFinal = stores.length;
    const recentWeeks = S.data.availableWeeks.slice(-6);
    const chartLabels = recentWeeks.map(w => 'W'+w);
    const gh = S.computed.guestHealth[store]?.[fw];
    setTimeout(() => {
      const storeSalesData = recentWeeks.map(w => S.computed.storeTotals[store]?.[w]?.sales || 0);
      const brandAvgSalesData = recentWeeks.map(w => (S.computed.brandTotals[w]?.sales || 0) / storeCountFinal);
      createTrendChart('sc-sales-trend', {
        labels: chartLabels,
        datasets:[
          {label:store, data:storeSalesData, color:'var(--chart-2026)', style:'solid'},
          {label:'Brand Avg', data:brandAvgSalesData, color:'var(--chart-brand)', style:'dashed'}
        ],
        yAxisFormat:'currency', showLegend:true
      });
      const storeOrdersData = recentWeeks.map(w => S.computed.storeTotals[store]?.[w]?.orders || 0);
      const brandAvgOrdersData = recentWeeks.map(w => (S.computed.brandTotals[w]?.orders || 0) / storeCountFinal);
      createTrendChart('sc-orders-trend', {
        labels: chartLabels,
        datasets:[
          {label:store, data:storeOrdersData, color:'var(--chart-2026)', style:'solid'},
          {label:'Brand Avg', data:brandAvgOrdersData, color:'var(--chart-brand)', style:'dashed'}
        ],
        yAxisFormat:'number', yAxisLabel:'Orders', showLegend:true
      });
      if (gh) {
        const ghWeeks = S.data.availableWeeks.slice(-10);
        const ghLabels = ghWeeks.map(w => 'W'+w);
        const ghData = ghWeeks.map(w => S.computed.guestHealth[store]?.[w]?.smoothed ?? null);
        createTrendChart('sc-guest-trend', {
          labels: ghLabels,
          datasets:[
            {label:'Guest Score', data:ghData, color:'var(--chart-2026)', style:'solid'},
            {label:'Green (75)', data:ghWeeks.map(()=>75), color:'var(--green)', style:'dashed'},
            {label:'Red (60)', data:ghWeeks.map(()=>60), color:'var(--red)', style:'dashed'}
          ],
          yAxisFormat:'number', yAxisLabel:'Score', showLegend:true
        });
      }
    }, 0);
  }
}

function renderFinancials() {
  const fw = S.week;
  const per = S.data.currentPeriod;
  const perNum = parseInt(per.replace('P', ''));
  const stores = getStores();
  const allStores = S.data.stores.map(s => s.name);
  const ebitda = S.computed.ebitda[per];
  const periodWeeks = S.data.availableWeeks.filter(w => S.data.weekToPeriod[w] === per);
  const weeksElapsed = periodWeeks.length;
  const totalWeeks = CONFIG.weeksPerPeriod;
  const weeksRemaining = totalWeeks - weeksElapsed;

  // Budget totals
  const budgetTotal = S.data.budget.filter(b => b.period === perNum).reduce((s, b) => s + b.budgetSales, 0);
  const ptdRevenue = ebitda?.revenue || 0;
  const budgetVariance = ptdRevenue - budgetTotal * (weeksElapsed / totalWeeks);
  const ptdPct = budgetTotal > 0 ? (ptdRevenue / budgetTotal) * 100 : 0;
  const runRateNeeded = weeksRemaining > 0 ? (budgetTotal - ptdRevenue) / weeksRemaining : 0;
  const onPace = ptdRevenue >= (budgetTotal / totalWeeks * weeksElapsed);

  // ── Section 1: PTD Summary ──
  let html = `<div class="card"><div class="card-title">Period-to-Date Summary — ${per} · ${weeksElapsed} of ${totalWeeks} weeks</div>`;
  html += `<div class="kpi-row">`;
  html += kpiTile({label:'PTD Revenue', value:fmt$(ptdRevenue), size:'large'});
  html += kpiTile({label:'Budget', value:fmt$(budgetTotal), subtitle:`Variance: <span style="color:${budgetVariance >= 0 ? 'var(--green)' : 'var(--red)'}"> ${budgetVariance >= 0 ? '+' : ''}${fmt$(budgetVariance)}</span>`});
  if (onPace) {
    html += kpiTile({label:'Run Rate Status', value:'<span style="color:var(--green)">On Pace ✓</span>'});
  } else {
    html += kpiTile({label:'Weekly Run Rate Needed', value:fmt$(runRateNeeded), subtitle:'to hit period budget'});
  }
  html += kpiTile({label:'Food Cost % (PTD)', value:fmtPct(ebitda?.revenue > 0 ? ebitda.foodCost / ebitda.revenue : 0)});
  html += kpiTile({label:'All-In Labor % (PTD)', value:fmtPct(ebitda?.revenue > 0 ? ebitda.allInLabor / ebitda.revenue : 0)});
  html += `</div>`;
  // Progress bar
  html += `<div class="budget-progress"><div class="budget-progress-fill" style="width:${Math.min(100, ptdPct)}%"></div></div>`;
  html += `<div class="budget-progress-label">${fmtPct(ptdPct / 100)} of period budget · ${weeksRemaining} week${weeksRemaining !== 1 ? 's' : ''} remaining</div>`;
  html += `</div>`;

  // ── Section 2: Store PTD Table ──
  html += `<div class="card"><div class="card-title">Store PTD Performance — ${per}</div>`;
  const storeRows = stores.map(store => {
    const bp = S.computed.budgetPacing[store];
    if (!bp) return null;
    const proratedBudget = bp.periodBudget * (weeksElapsed / totalWeeks);
    const variance = bp.ptdSales - proratedBudget;
    const variancePct = proratedBudget > 0 ? variance / proratedBudget : 0;
    const projectedSales = weeksElapsed > 0 ? (bp.ptdSales / weeksElapsed) * totalWeeks : 0;
    const storeOnPace = projectedSales >= bp.periodBudget;
    const pyPTD = bp.priorYearPTD || 0;
    const yoy = pyPTD > 0 ? (bp.ptdSales - pyPTD) / pyPTD : null;
    return {store, district:storeDistrict(store), ptdSales:bp.ptdSales, periodBudget:bp.periodBudget, variance, variancePct, onPace:storeOnPace, priorYearPTD:pyPTD, yoy};
  }).filter(Boolean);

  html += sortableTable({
    id:'fin-ptd', headers:[
      {key:'store',label:'Store',width:'130px'},
      {key:'district',label:'District',width:'70px'},
      {key:'ptdSales',label:'PTD Sales',format:'currency',sortable:true},
      {key:'periodBudget',label:'Period Budget',format:'currency',sortable:true},
      {key:'variance',label:'Variance $',format:'currency',sortable:true},
      {key:'variancePct',label:'Variance %',format:'changePct',sortable:true},
      {key:'onPace',label:'On Pace'},
      {key:'priorYearPTD',label:'PY PTD',format:'currency',sortable:true},
      {key:'yoy',label:'YoY',format:'changePct',sortable:true}
    ],
    rows: storeRows.map(r => ({...r, onPace: r.onPace ? '<span style="color:var(--green)">✓</span>' : '<span style="color:var(--red)">✗</span>'})),
    groupBy:'district', groupOrder:Object.keys(CONFIG.districts),
    defaultSort:{key:'variance',dir:'asc'}
  });
  html += '</div>';

  // ── Section 3: Cost Trends ──
  html += `<div class="chart-row">`;
  html += `<div class="card"><div class="card-title">Food Cost % Trend — Last 6 Weeks</div>`;
  html += `<div style="position:relative;height:200px"><canvas id="fin-food-trend"></canvas></div></div>`;
  html += `<div class="card"><div class="card-title">Labor Cost % Trend — Last 6 Weeks</div>`;
  html += `<div style="position:relative;height:200px"><canvas id="fin-labor-trend"></canvas></div></div>`;
  html += `</div>`;

  // ── Section 4: Period Cost Envelope ──
  if (weeksRemaining > 0) {
    html += `<div class="card"><div class="card-title">Period Cost Envelope — ${per} · ${weeksRemaining} week${weeksRemaining !== 1 ? 's' : ''} remaining</div>`;
    const envelopeRows = stores.map(store => {
      const budgetRow = S.data.budget.find(b => b.store === store && b.period === perNum);
      if (!budgetRow) return null;
      const bp = S.computed.budgetPacing[store];
      if (!bp) return null;
      const remainingBudgetRev = budgetRow.budgetSales - bp.ptdSales;
      // Food cost envelope
      const ptdFcDollars = periodWeeks.reduce((s, w) => {
        const c = S.computed.costs[store]?.[w];
        const st = S.computed.storeTotals[store]?.[w];
        return s + (c?.foodCostPct != null && st ? c.foodCostPct * st.sales : 0);
      }, 0);
      const fcAllowedTotal = budgetRow.budgetSales * budgetRow.budgetFoodCostPct;
      const fcRemainingAllowed = fcAllowedTotal - ptdFcDollars;
      const canRunFC = remainingBudgetRev > 0 ? fcRemainingAllowed / remainingBudgetRev : null;
      const fcHeadroom = canRunFC != null ? canRunFC - budgetRow.budgetFoodCostPct : null;
      // Labor cost envelope
      const ptdLaborDollars = periodWeeks.reduce((s, w) => {
        const c = S.computed.costs[store]?.[w];
        const st = S.computed.storeTotals[store]?.[w];
        return s + (c?.laborCostPct != null && st ? c.laborCostPct * st.sales : 0);
      }, 0);
      const blp = budgetRow.budgetAllInLaborPct || budgetRow.budgetLaborPct;
      const laborAllowedTotal = budgetRow.budgetSales * blp;
      const laborRemainingAllowed = laborAllowedTotal - ptdLaborDollars;
      const canRunLabor = remainingBudgetRev > 0 ? laborRemainingAllowed / remainingBudgetRev : null;
      const laborHeadroom = canRunLabor != null ? canRunLabor - blp : null;
      return {store, ptdSales:bp.ptdSales, remainingBudget:remainingBudgetRev,
        canRunFC, budgetFC:budgetRow.budgetFoodCostPct, fcHeadroom,
        canRunLabor, budgetLabor:blp, laborHeadroom};
    }).filter(Boolean);

    html += `<div class="table-wrap"><table class="data-table" id="fin-envelope"><thead><tr>`;
    html += `<th>Store</th><th>PTD Sales</th><th>Remaining Budget</th><th>Food: Can Run</th><th>Budget FC%</th><th>Headroom</th><th>Labor: Can Run</th><th>Budget Labor%</th><th>Headroom</th>`;
    html += `</tr></thead><tbody>`;
    envelopeRows.sort((a, b) => (a.fcHeadroom || 0) - (b.fcHeadroom || 0));
    envelopeRows.forEach(r => {
      const fcStr = r.canRunFC != null && r.canRunFC > 0 ? fmtPct(r.canRunFC) : '<span style="color:var(--red);font-weight:600">Overrun</span>';
      const lStr = r.canRunLabor != null && r.canRunLabor > 0 ? fmtPct(r.canRunLabor) : '<span style="color:var(--red);font-weight:600">Overrun</span>';
      const fcHClass = r.fcHeadroom != null && r.fcHeadroom >= 0 ? 'headroom-pos' : 'headroom-neg';
      const lHClass = r.laborHeadroom != null && r.laborHeadroom >= 0 ? 'headroom-pos' : 'headroom-neg';
      html += `<tr>`;
      html += `<td>${r.store}</td><td>${fmt$(r.ptdSales)}</td><td>${fmt$(r.remainingBudget)}</td>`;
      html += `<td>${fcStr}</td><td>${fmtPct(r.budgetFC)}</td><td class="${fcHClass}">${r.fcHeadroom != null ? (r.fcHeadroom >= 0 ? '+' : '') + (r.fcHeadroom * 100).toFixed(1) + ' pts' : '—'}</td>`;
      html += `<td>${lStr}</td><td>${fmtPct(r.budgetLabor)}</td><td class="${lHClass}">${r.laborHeadroom != null ? (r.laborHeadroom >= 0 ? '+' : '') + (r.laborHeadroom * 100).toFixed(1) + ' pts' : '—'}</td>`;
      html += `</tr>`;
    });
    html += `</tbody></table></div></div>`;
  } else {
    html += `<div class="card"><div class="card-title">Period Cost Envelope</div><div style="padding:12px;color:var(--muted)">Period complete — no remaining weeks for cost envelope.</div></div>`;
  }

  // ── Section 5: EBITDA Waterfall ──
  html += `<div class="card"><div class="card-title">Four-Wall EBITDA Waterfall — ${per} PTD</div>`;
  html += `<div style="position:relative;height:280px"><canvas id="fin-waterfall"></canvas></div>`;
  if (ebitda && ebitda.revenue > 0) {
    const fc = ebitda.foodCost;
    const labor = ebitda.allInLabor;
    const remainder = ebitda.revenue - fc - labor;
    const estEbitdaPct = ebitda.budgetEbitdaPct || 0;
    const estEbitda = estEbitdaPct > 0 ? ebitda.revenue * estEbitdaPct : null;
    const estOther = estEbitda != null ? remainder - estEbitda : null;
    html += `<div class="waterfall-summary">`;
    html += `<span>Revenue: ${fmt$(ebitda.revenue)}</span>`;
    html += `<span>Food: ${fmt$(fc)} (${fmtPct(fc / ebitda.revenue)})</span>`;
    html += `<span>Labor: ${fmt$(labor)} (${fmtPct(labor / ebitda.revenue)})</span>`;
    if (estOther != null) {
      html += `<span>Other (est): ${fmt$(estOther)} (${fmtPct(estOther / ebitda.revenue)})</span>`;
      html += `<span>EBITDA (est): ${fmt$(estEbitda)} (${fmtPct(estEbitdaPct)})</span>`;
    } else {
      html += `<span>Remainder: ${fmt$(remainder)} (${fmtPct(remainder / ebitda.revenue)})</span>`;
    }
    html += `<span style="color:var(--muted)">Budget EBITDA: ${fmtPct(ebitda.budgetEbitdaPct)}</span>`;
    html += `</div>`;
  }
  html += `</div>`;

  document.getElementById('content').innerHTML = html;

  // ── Render Charts ──
  setTimeout(() => {
    const recentWeeks = S.data.availableWeeks.slice(-6);
    const wLabels = recentWeeks.map(w => 'W' + w);

    // Food cost trend
    const fcData = recentWeeks.map(w => getSalesWeightedCost(allStores, w, 'foodCostPct'));
    const budgetFcAvg = (() => {
      const bRows = S.data.budget.filter(b => b.period === perNum && b.budgetFoodCostPct > 0);
      if (!bRows.length) return null;
      let totalBudgetDollars = 0, totalBudgetSales = 0;
      bRows.forEach(b => { totalBudgetDollars += b.budgetFoodCostPct * b.budgetSales; totalBudgetSales += b.budgetSales; });
      return totalBudgetSales > 0 ? totalBudgetDollars / totalBudgetSales : null;
    })();
    const fcDatasets = [{label:'Food Cost %', data:fcData, color:'var(--chart-2026)', style:'solid'}];
    if (budgetFcAvg != null) fcDatasets.push({label:'Budget', data:recentWeeks.map(() => budgetFcAvg), color:'var(--chart-budget)', style:'dashed'});
    createTrendChart('fin-food-trend', {labels:wLabels, datasets:fcDatasets, yAxisFormat:'percent', showLegend:true});

    // Labor cost trend
    const lcData = recentWeeks.map(w => getSalesWeightedCost(allStores, w, 'laborCostPct'));
    const budgetLcAvg = (() => {
      const bRows = S.data.budget.filter(b => b.period === perNum && (b.budgetAllInLaborPct > 0 || b.budgetLaborPct > 0));
      if (!bRows.length) return null;
      let totalBudgetDollars = 0, totalBudgetSales = 0;
      bRows.forEach(b => { const blp = b.budgetAllInLaborPct || b.budgetLaborPct; totalBudgetDollars += blp * b.budgetSales; totalBudgetSales += b.budgetSales; });
      return totalBudgetSales > 0 ? totalBudgetDollars / totalBudgetSales : null;
    })();
    const lcDatasets = [{label:'Labor Cost %', data:lcData, color:'var(--chart-2026)', style:'solid'}];
    if (budgetLcAvg != null) lcDatasets.push({label:'Budget', data:recentWeeks.map(() => budgetLcAvg), color:'var(--chart-budget)', style:'dashed'});
    createTrendChart('fin-labor-trend', {labels:wLabels, datasets:lcDatasets, yAxisFormat:'percent', showLegend:true});

    // EBITDA Waterfall
    if (ebitda && ebitda.revenue > 0) {
      const revenue = ebitda.revenue;
      const food = ebitda.foodCost;
      const labor = ebitda.allInLabor;
      // Estimate EBITDA using budget EBITDA % (since Other Controllable not in data)
      const estEbitdaPct = ebitda.budgetEbitdaPct || 0;
      const remainder = revenue - food - labor;
      // If we have a budget EBITDA %, use it to estimate Other; otherwise show 3-bar
      const hasBudgetEbitda = estEbitdaPct > 0;
      let waterfallLabels, waterfallSpacers, waterfallValues, waterfallColors;
      if (hasBudgetEbitda) {
        const estEbitda = revenue * estEbitdaPct;
        const estOther = remainder - estEbitda;
        waterfallLabels = ['Revenue', 'Food Cost', 'All-In Labor', 'Other (est)', 'EBITDA (est)'];
        waterfallSpacers = [0, revenue - food, revenue - food - labor, revenue - food - labor - Math.max(0, estOther), 0];
        waterfallValues = [revenue, food, labor, Math.max(0, estOther), Math.max(0, estEbitda)];
        waterfallColors = [resolveColor('var(--gold)'), resolveColor('var(--red)'), resolveColor('var(--red)'), resolveColor('var(--yellow)'), resolveColor('var(--green)')];
      } else {
        waterfallLabels = ['Revenue', 'Food Cost', 'All-In Labor', 'Remainder'];
        waterfallSpacers = [0, revenue - food, revenue - food - labor, 0];
        waterfallValues = [revenue, food, labor, remainder];
        waterfallColors = [resolveColor('var(--gold)'), resolveColor('var(--red)'), resolveColor('var(--red)'), resolveColor('var(--green)')];
      }

      destroyChart('fin-waterfall');
      const ctx = document.getElementById('fin-waterfall');
      if (ctx) {
        _charts['fin-waterfall'] = new Chart(ctx, {
          type: 'bar',
          data: {
            labels: waterfallLabels,
            datasets: [
              { label: 'Spacer', data: waterfallSpacers, backgroundColor: 'transparent', borderWidth: 0, barPercentage: 0.6 },
              { label: 'Value', data: waterfallValues, backgroundColor: waterfallColors, borderRadius: 3, barPercentage: 0.6 }
            ]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: { filter: item => item.datasetIndex === 1, callbacks: { label: c => fmt$(c.raw) } }
            },
            scales: {
              x: { stacked: true, grid: { display: false }, ticks: { font: { family: 'Calibri', size: 11 } } },
              y: { stacked: true, grid: { color: '#E8E0D822' }, ticks: { font: { family: 'Calibri', size: 11 }, callback: v => fmt$(v) } }
            }
          }
        });
      }
    }
  }, 0);
}

/* ═══════════════════════════════════════════════════════════════════
   MENU INTELLIGENCE HELPERS
   ═══════════════════════════════════════════════════════════════════ */
function classifyItemLocal(name) {
  const lc = name.toLowerCase();
  for (const [cat, keywords] of Object.entries(CONFIG.itemClassifier)) {
    if (keywords.some(kw => lc.includes(kw))) return cat;
  }
  return 'UNCATEGORIZED';
}
function getPlateType(itemName) {
  const lc = itemName.toLowerCase();
  if (lc.includes('1 meat') || lc.includes('1m') || lc.includes('sun special')) return '1M';
  if (lc.includes('r&r plate') || lc.includes('r&r two')) return 'RR';
  if (lc.includes('3 meat') || lc.includes('3m')) return '3M';
  if (lc.includes('2 meat') || lc.includes('2m')) return '2M';
  return null;
}
function getBrisketTier(modifierName) {
  const lc = modifierName.toLowerCase();
  if (lc.includes('-1m') || lc.includes('1m')) return '1M';
  if (lc.includes('-3m') || lc.includes('3m')) return '3M';
  if (lc.includes('-2m') || lc.includes('2m') || lc.includes('c-2')) return '2M';
  return null;
}

function renderMenu() {
  const fw = S.week;
  const hasWeekly = S.features.hasPmixWeekly;
  const view = S.menuView;
  let items26, items25, viewLabel, compLabel;

  if (view === 'Period' || !hasWeekly) {
    const p = S.menuPeriod || S.data.currentPeriod;
    items26 = S.data.pmixPeriod2026.filter(r => r.period === p);
    items25 = S.data.pmixPeriod2025.filter(r => r.period === p);
    viewLabel = `Period ${p}`;
    compLabel = `${p} 2026 vs ${p} 2025`;
  } else {
    items26 = S.data.pmixWeekly2026.filter(r => r.fw === fw);
    items25 = S.data.pmixWeekly2025.filter(r => r.fw === fw);
    viewLabel = `Week ${fw}`;
    compLabel = `W${fw} 2026 vs W${fw} 2025`;
  }

  const total26 = items26.reduce((s, r) => s + r.totalSales, 0);
  const total25 = items25.reduce((s, r) => s + r.totalSales, 0);

  // ── Toggle bar + period selector ──
  let html = `<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">`;
  if (hasWeekly) {
    html += `<div class="menu-toggle">`;
    html += `<button class="${view==='Period'?'active':''}" onclick="S.menuView='Period';renderMenu()">Period</button>`;
    html += `<button class="${view==='Weekly'?'active':''}" onclick="S.menuView='Weekly';renderMenu()">Weekly</button>`;
    html += `</div>`;
  }
  if (view === 'Period' || !hasWeekly) {
    html += `<select class="period-sel" onchange="S.menuPeriod=this.value;renderMenu()">`;
    S.data.availablePeriods.forEach(p => {
      html += `<option value="${p}" ${p===(S.menuPeriod||S.data.currentPeriod)?'selected':''}>${p}</option>`;
    });
    html += `</select>`;
  }
  html += `<span style="font-size:14px;font-weight:600;color:var(--text)">Menu Intelligence — ${viewLabel}</span>`;
  html += `</div>`;

  // ════════════════════════════════════════
  // Section 1: Revenue Architecture
  // ════════════════════════════════════════
  html += `<div class="card menu-section"><div class="card-title">Revenue Architecture — ${compLabel}</div>`;
  const totalChg = total25 > 0 ? (total26 - total25)/total25 : null;
  html += `<div style="font-size:13px;margin-bottom:10px;color:var(--text)">Total Revenue: ${fmt$(total26)} vs ${fmt$(total25)} (<span style="color:${chgColor(totalChg)}">${fmtChg(totalChg)}</span>)</div>`;

  // Classify and group
  const catMap26 = {}, catMap25 = {};
  items26.forEach(r => { const c = classifyItemLocal(r.item); if (!catMap26[c]) catMap26[c]={sales:0,qty:0}; catMap26[c].sales+=r.totalSales; catMap26[c].qty+=r.qty; });
  items25.forEach(r => { const c = classifyItemLocal(r.item); if (!catMap25[c]) catMap25[c]={sales:0,qty:0}; catMap25[c].sales+=r.totalSales; catMap25[c].qty+=r.qty; });

  const archCats = Object.keys(catMap26).filter(k => k!=='UNCATEGORIZED' && k!=='MODIFIER' && k!=='NON_FOOD')
    .sort((a,b) => catMap26[b].sales - catMap26[a].sales);

  html += sortableTable({
    id:'menu-arch-full', headers:[
      {key:'category',label:'Category',width:'160px'},
      {key:'sales26',label:'2026 Sales',format:'currency',sortable:true},
      {key:'share26',label:'2026 Share',format:'percent',sortable:true},
      {key:'sales25',label:'2025 Sales',format:'currency',sortable:true},
      {key:'share25',label:'2025 Share',format:'percent',sortable:true},
      {key:'shift',label:'Share Shift',format:'changePct',sortable:true}
    ],
    rows: archCats.map(cat => {
      const s26 = catMap26[cat]?.sales||0, s25 = catMap25[cat]?.sales||0;
      const sh26 = total26>0 ? s26/total26 : 0, sh25 = total25>0 ? s25/total25 : 0;
      const shift = sh26 - sh25;
      return {
        category: cat.replace(/_/g,' '),
        sales26: s26, share26: sh26,
        sales25: s25 > 0 ? s25 : null, share25: s25 > 0 ? sh25 : null,
        shift: s25 > 0 ? shift : null,
        _shiftRaw: shift
      };
    }),
    defaultSort:{key:'sales26',dir:'desc'}
  });
  // Patch shift column coloring via post-processing
  html += `</div>`;

  // ════════════════════════════════════════
  // Section 2: Plate Type Migration
  // ════════════════════════════════════════
  html += `<div class="card menu-section"><div class="card-title">Plate Type Migration — ${compLabel}</div>`;

  function getPlateData(items) {
    const tiers = {}, totalUnits = {qty:0};
    items.forEach(r => {
      if (classifyItemLocal(r.item) !== 'ENTREE_PLATE') return;
      const t = getPlateType(r.item);
      if (!t) return;
      if (!tiers[t]) tiers[t] = {qty:0, sales:0};
      tiers[t].qty += r.qty; tiers[t].sales += r.totalSales;
      totalUnits.qty += r.qty;
    });
    return {tiers, totalQty: totalUnits.qty};
  }

  const plate26 = getPlateData(items26), plate25 = getPlateData(items25);
  const plateOrder = ['1M','2M','3M','RR'];
  const plateLabels = {'1M':'1 Meat','2M':'2 Meat','3M':'3 Meat','RR':'R&R Plate'};
  const plateColors = {'1M':'#C4922A','2M':'#5C3D2E','3M':'#8B2500','RR':'#2D8F4E'};

  // Stacked bar chart
  html += `<div style="position:relative;height:120px"><canvas id="chart-plate-migration"></canvas></div>`;

  // Comparison table
  html += `<div class="table-wrap" style="margin-top:12px"><table class="data-table"><thead><tr>`;
  html += `<th>Plate Type</th><th>2026 Units</th><th>2026 Share</th><th>2025 Units</th><th>2025 Share</th><th>Share Shift</th>`;
  html += `</tr></thead><tbody>`;
  plateOrder.forEach(t => {
    const d26 = plate26.tiers[t], d25 = plate25.tiers[t];
    const u26 = d26?.qty||0, u25 = d25?.qty||0;
    const sh26 = plate26.totalQty > 0 ? u26/plate26.totalQty : 0;
    const sh25 = plate25.totalQty > 0 ? u25/plate25.totalQty : 0;
    const shift = (sh25 > 0 || sh26 > 0) ? sh26 - sh25 : null;
    const shiftStr = shift != null ? `<span style="color:${shift>=0?'var(--green)':'var(--red)'}">${shift>=0?'▲':'▼'} ${shift>=0?'+':''}${(shift*100).toFixed(1)}%</span>` : '—';
    html += `<tr><td><span class="plate-swatch" style="background:${plateColors[t]}"></span>${plateLabels[t]}</td>`;
    html += `<td>${u26.toLocaleString()}</td><td>${fmtPct(sh26)}</td>`;
    html += `<td>${u25 > 0 ? u25.toLocaleString() : '—'}</td><td>${u25 > 0 ? fmtPct(sh25) : '—'}</td>`;
    html += `<td>${shiftStr}</td></tr>`;
  });
  html += `</tbody></table></div></div>`;

  // ════════════════════════════════════════
  // Section 3: Brisket Attachment & Upcharge Revenue
  // ════════════════════════════════════════
  html += `<div class="card menu-section"><div class="card-title">Brisket Attachment & Upcharge Revenue — ${compLabel}</div>`;

  function getBrisketData(items) {
    let brisketQty = 0, brisketSales = 0, plateQty = 0;
    const tierData = {};
    const tierPlateQty = {};
    items.forEach(r => {
      const cat = classifyItemLocal(r.item);
      if (cat === 'ENTREE_PLATE') {
        plateQty += r.qty;
        const pt = getPlateType(r.item);
        if (pt) { tierPlateQty[pt] = (tierPlateQty[pt]||0) + r.qty; }
      }
      if (cat === 'MODIFIER' && r.item.toLowerCase().includes('brisket')) {
        brisketQty += r.qty; brisketSales += r.totalSales;
        const bt = getBrisketTier(r.item);
        if (bt) {
          if (!tierData[bt]) tierData[bt] = {qty:0, sales:0};
          tierData[bt].qty += r.qty; tierData[bt].sales += r.totalSales;
        }
      }
    });
    return {brisketQty, brisketSales, plateQty, attachRate: plateQty>0 ? brisketQty/plateQty : 0, revPerSelection: brisketQty>0 ? brisketSales/brisketQty : 0, tierData, tierPlateQty};
  }

  const brk26 = getBrisketData(items26), brk25 = getBrisketData(items25);

  html += `<div class="kpi-row">`;
  html += kpiTile({label:'Brisket Attachment Rate', value:fmtPct(brk26.attachRate), subtitle: brk25.plateQty > 0 ? `2025: ${fmtPct(brk25.attachRate)}` : ''});
  const upchargeChg = brk25.brisketSales > 0 ? (brk26.brisketSales - brk25.brisketSales)/brk25.brisketSales : null;
  html += kpiTile({label:'Upcharge Revenue', value:fmt$(brk26.brisketSales), yoyChange: upchargeChg, subtitle: brk25.brisketSales > 0 ? `2025: ${fmt$(brk25.brisketSales)}` : ''});
  html += kpiTile({label:'Effective Rev / Selection', value: brk26.brisketQty > 0 ? '$'+brk26.revPerSelection.toFixed(2) : '—', subtitle: brk25.brisketQty > 0 ? `2025: $${brk25.revPerSelection.toFixed(2)}` : ''});
  html += `</div>`;

  // Tier breakdown
  const brkTiers = ['1M','2M','3M'];
  html += `<div class="table-wrap" style="margin-top:10px"><table class="data-table"><thead><tr>`;
  html += `<th>Plate Tier</th><th>Brisket Selections</th><th>Total Plates</th><th>Attach Rate</th><th>2025 Rate</th><th>Change</th>`;
  html += `</tr></thead><tbody>`;
  brkTiers.forEach(t => {
    const bd26 = brk26.tierData[t], bd25 = brk25.tierData[t];
    const sel26 = bd26?.qty||0, pq26 = brk26.tierPlateQty[t]||0;
    const sel25 = bd25?.qty||0, pq25 = brk25.tierPlateQty[t]||0;
    const rate26 = pq26 > 0 ? sel26/pq26 : 0, rate25 = pq25 > 0 ? sel25/pq25 : 0;
    const chg = (rate25 > 0 || rate26 > 0) ? rate26 - rate25 : null;
    const chgStr = chg != null ? `<span style="color:${chg>=0?'var(--green)':'var(--red)'}">${chg>=0?'▲':'▼'} ${chg>=0?'+':''}${(chg*100).toFixed(1)}%</span>` : '—';
    html += `<tr><td>${plateLabels[t]||t}</td><td>${sel26.toLocaleString()}</td><td>${pq26.toLocaleString()}</td>`;
    html += `<td>${fmtPct(rate26)}</td><td>${pq25>0?fmtPct(rate25):'—'}</td><td>${chgStr}</td></tr>`;
  });
  html += `</tbody></table></div></div>`;

  // ════════════════════════════════════════
  // Section 4: Attachment Rate Trends (Weekly only)
  // ════════════════════════════════════════
  html += `<div class="card menu-section"><div class="card-title">Attachment Rate Trends — Weekly</div>`;
  if (!hasWeekly) {
    html += `<p style="color:var(--muted);font-size:12px;padding:12px 0">Weekly PMIX data required for attachment rate trends. Add Brink_Pmix_Weekly_2026 and Brink_Pmix_Weekly_2025 tabs to enable this view.</p>`;
  } else {
    const attRates = S.computed.pmix.attachmentRates;
    const attWeeks = Object.keys(attRates).map(Number).sort((a,b)=>a-b);
    const currAtt = attRates[fw];
    const prevAtt = attRates[fw-1];

    html += `<div class="kpi-row">`;
    html += kpiTile({label:'Side Attach Rate', value: currAtt ? fmtPct(currAtt.sideRate) : '—', subtitle: prevAtt ? `Prior: ${fmtPct(prevAtt.sideRate)}` : ''});
    html += kpiTile({label:'Dessert Attach Rate', value: currAtt ? fmtPct(currAtt.dessertRate) : '—', subtitle: prevAtt ? `Prior: ${fmtPct(prevAtt.dessertRate)}` : (currAtt ? `Each 1% ≈ $${Math.round(currAtt.entreeCount*0.01*4.5)}/wk` : '')});
    html += kpiTile({label:'Drink Attach Rate', value: currAtt ? fmtPct(currAtt.drinkRate) : '—', subtitle: prevAtt ? `Prior: ${fmtPct(prevAtt.drinkRate)}` : ''});
    html += kpiTile({label:'Entree Count', value: currAtt ? currAtt.entreeCount.toLocaleString() : '—', subtitle:`Week ${fw}`});
    html += `</div>`;

    // Three separate trend charts
    html += `<div class="chart-row" style="display:flex;gap:12px">`;
    html += `<div style="flex:1;min-width:0"><div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;margin-bottom:4px">Side Attachment</div><div style="position:relative;height:150px"><canvas id="chart-side-attach"></canvas></div></div>`;
    html += `<div style="flex:1;min-width:0"><div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;margin-bottom:4px">Dessert Attachment</div><div style="position:relative;height:150px"><canvas id="chart-dessert-attach"></canvas></div></div>`;
    html += `<div style="flex:1;min-width:0"><div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;margin-bottom:4px">Drink Attachment</div><div style="position:relative;height:150px"><canvas id="chart-drink-attach"></canvas></div></div>`;
    html += `</div>`;
  }
  html += `</div>`;

  // ════════════════════════════════════════
  // Section 5: Value Menu Monitor
  // ════════════════════════════════════════
  const vm = S.computed.pmix.valueMix;
  const plateShareTrend = vm?.plateShareTrend || [];
  const valueShareTrend = vm?.valueShareTrend || [];

  html += `<div class="card menu-section"><div class="card-title">Value Menu Monitor — Cannibalization Watch</div>`;
  if (!hasWeekly || plateShareTrend.length === 0) {
    html += `<p style="color:var(--muted);font-size:12px;padding:12px 0">Weekly PMIX data required for value menu monitoring.</p>`;
  } else {
    html += `<div style="position:relative;height:180px"><canvas id="chart-value-cannibalize"></canvas></div>`;
    // Build narrative
    const latestPlate = plateShareTrend[plateShareTrend.length - 1];
    const firstPlate = plateShareTrend[0];
    const latestValue = valueShareTrend[valueShareTrend.length - 1];
    const plateShift = latestPlate.share - firstPlate.share;
    let narrative;
    if (Math.abs(plateShift) < 0.003) {
      narrative = `Plate share stable at ${fmtPct(latestPlate.share)} while value menu holds ${fmtPct(latestValue.share)} — no cannibalization detected.`;
    } else if (plateShift < -0.003) {
      narrative = `⚠ Plate share declined from ${fmtPct(firstPlate.share)} to ${fmtPct(latestPlate.share)} (${(plateShift*100).toFixed(1)} pts) as value menu grew to ${fmtPct(latestValue.share)}. Monitor for cannibalization.`;
    } else {
      narrative = `Plate share grew from ${fmtPct(firstPlate.share)} to ${fmtPct(latestPlate.share)} alongside value menu at ${fmtPct(latestValue.share)} — both growing, healthy sign.`;
    }
    html += `<div class="cannibal-narrative">${narrative}</div>`;
  }
  html += `</div>`;

  // ════════════════════════════════════════
  // Section 6: Top 20 Items Comparison
  // ════════════════════════════════════════
  html += `<div class="card menu-section"><div class="card-title">Top 20 Items — ${compLabel}</div>`;

  const sorted26 = [...items26].sort((a,b) => b.totalSales - a.totalSales).slice(0,20);
  const items25Map = {};
  items25.forEach(r => { items25Map[r.item.trim().toLowerCase()] = r; });

  html += `<div class="table-wrap"><table class="data-table"><thead><tr>`;
  html += `<th style="width:30px">#</th><th>Item</th><th>Category</th><th style="text-align:right">2026 Sales</th><th style="text-align:right">2026 Qty</th><th style="text-align:right">Avg Price</th><th style="text-align:right">2025 Sales</th><th style="text-align:right">2025 Qty</th><th style="text-align:right">Sales Δ%</th><th style="text-align:right">Mix Shift</th>`;
  html += `</tr></thead><tbody>`;

  sorted26.forEach((r, i) => {
    const cat = classifyItemLocal(r.item);
    const catLabel = cat.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()).replace(/\bAnd\b/g,'and');
    const match25 = items25Map[r.item.trim().toLowerCase()];
    const sh26 = total26 > 0 ? r.totalSales / total26 : 0;
    const sh25 = match25 && total25 > 0 ? match25.totalSales / total25 : null;
    const salesChg = match25 && match25.totalSales > 0 ? (r.totalSales - match25.totalSales)/match25.totalSales : null;
    const mixShift = sh25 != null ? sh26 - sh25 : null;
    const mixStr = mixShift != null ? `<span style="color:${mixShift>=0?'var(--green)':'var(--red)'}"> ${mixShift>=0?'+':''}${(mixShift*100).toFixed(1)} pts</span>` : '';
    const bg = i % 2 === 1 ? ` style="background:var(--card2)"` : '';

    html += `<tr${bg}>`;
    html += `<td>${i+1}</td>`;
    html += `<td>${r.item}</td>`;
    html += `<td><span style="font-size:11px;color:var(--muted)">${catLabel}</span></td>`;
    html += `<td style="text-align:right">${fmt$(r.totalSales)}</td>`;
    html += `<td style="text-align:right">${r.qty.toLocaleString()}</td>`;
    html += `<td style="text-align:right">$${r.avgPrice.toFixed(2)}</td>`;
    if (match25) {
      html += `<td style="text-align:right">${fmt$(match25.totalSales)}</td>`;
      html += `<td style="text-align:right">${match25.qty.toLocaleString()}</td>`;
      html += `<td style="text-align:right"><span style="color:${chgColor(salesChg)}">${chgArrow(salesChg)} ${fmtChg(salesChg)}</span></td>`;
    } else {
      html += `<td style="text-align:right"><span class="new-badge">NEW</span></td>`;
      html += `<td style="text-align:right"><span class="new-badge">NEW</span></td>`;
      html += `<td style="text-align:right">—</td>`;
    }
    html += `<td style="text-align:right">${mixStr || '—'}</td>`;
    html += `</tr>`;
  });

  html += `</tbody></table></div></div>`;

  // ── Render to DOM ──
  document.getElementById('content').innerHTML = html;

  // ── Post-render: create charts ──
  setTimeout(() => {
    // Plate migration stacked bar
    if (document.getElementById('chart-plate-migration')) {
      destroyChart('chart-plate-migration');
      const ctx = document.getElementById('chart-plate-migration');
      if (ctx) {
        const datasets = plateOrder.map(t => ({
          label: plateLabels[t],
          data: [
            plate26.totalQty > 0 ? ((plate26.tiers[t]?.qty||0)/plate26.totalQty)*100 : 0,
            plate25.totalQty > 0 ? ((plate25.tiers[t]?.qty||0)/plate25.totalQty)*100 : 0
          ],
          backgroundColor: plateColors[t] + (plateOrder.indexOf(t) >= 0 ? '' : ''),
          barPercentage: 0.6
        }));
        // Make 2025 bars slightly lighter
        const datasets2 = plateOrder.map((t,ti) => ({
          label: plateLabels[t],
          data: [
            plate26.totalQty > 0 ? ((plate26.tiers[t]?.qty||0)/plate26.totalQty)*100 : 0,
            plate25.totalQty > 0 ? ((plate25.tiers[t]?.qty||0)/plate25.totalQty)*100 : 0
          ],
          backgroundColor: [plateColors[t], plateColors[t]+'99'],
          barPercentage: 0.6
        }));
        _charts['chart-plate-migration'] = new Chart(ctx, {
          type: 'bar',
          data: { labels: ['2026','2025'], datasets: datasets2 },
          options: {
            indexAxis: 'y',
            responsive: true, maintainAspectRatio: false,
            plugins: {
              legend: { display: true, position:'bottom', labels:{font:{family:'Calibri',size:11}, boxWidth:14, padding:10} },
              tooltip: { callbacks: { label: c => c.dataset.label + ': ' + c.parsed.x.toFixed(1) + '%' } }
            },
            scales: {
              x: { stacked: true, grid:{display:true, color:'#E8E0D822'}, ticks:{font:{family:'Calibri',size:11}, callback: v => v+'%'}, max:100 },
              y: { stacked: true, grid:{display:false}, ticks:{font:{family:'Calibri',size:12,weight:'bold'}} }
            }
          }
        });
      }
    }

    // Attachment rate trend charts (if weekly data)
    if (hasWeekly) {
      const attRates = S.computed.pmix.attachmentRates;
      const attWeeks = Object.keys(attRates).map(Number).sort((a,b)=>a-b);
      const labels = attWeeks.map(w => 'W'+w);

      if (document.getElementById('chart-side-attach')) {
        createTrendChart('chart-side-attach', {
          labels, showLegend:false, yAxisFormat:'percent',
          datasets:[{label:'Side Rate', data:attWeeks.map(w=>attRates[w].sideRate), color:'var(--gold)', style:'solid'}]
        });
      }
      if (document.getElementById('chart-dessert-attach')) {
        createTrendChart('chart-dessert-attach', {
          labels, showLegend:false, yAxisFormat:'percent',
          datasets:[{label:'Dessert Rate', data:attWeeks.map(w=>attRates[w].dessertRate), color:'var(--brown)', style:'solid'}]
        });
      }
      if (document.getElementById('chart-drink-attach')) {
        createTrendChart('chart-drink-attach', {
          labels, showLegend:false, yAxisFormat:'percent',
          datasets:[{label:'Drink Rate', data:attWeeks.map(w=>attRates[w].drinkRate), color:'var(--chart-2025)', style:'dashed'}]
        });
      }
    }

    // Value menu cannibalization chart
    if (hasWeekly && plateShareTrend.length > 0 && document.getElementById('chart-value-cannibalize')) {
      createTrendChart('chart-value-cannibalize', {
        labels: plateShareTrend.map(d => 'W'+d.fw),
        showLegend: true,
        yAxisFormat: 'percent',
        yAxisLabel: 'Share of Total Units',
        datasets: [
          {label:'Plate Share', data:plateShareTrend.map(d=>d.share), color:'var(--gold)', style:'solid'},
          {label:'Value Menu Share', data:valueShareTrend.map(d=>d.share), color:'var(--brown)', style:'dashed'}
        ]
      });
    }
  }, 0);
}

function renderTrajectory() {
  const fw = S.week;
  const agg = getAgg(fw);
  const seasonality = S.computed.seasonality[fw];
  const selPeriod = S.trajectoryPeriod || S.data.currentPeriod;

  // ── Section 1: KPI Tiles ──
  let html = `<div class="kpi-row">`;
  html += kpiTile({label:'Brand Sales', value:fmt$(agg?.sales), wowChange:agg?.salesWoW, yoyChange:agg?.salesYoY, size:'large'});
  html += kpiTile({label:'Brand Orders', value:(agg?.orders||0).toLocaleString(), wowChange:agg?.ordersWoW, yoyChange:agg?.ordersYoY});
  if (seasonality) html += kpiTile({label:'Seasonal Index', value:seasonality.salesIndex.toFixed(2)+'x', subtitle:seasonality.narrative});
  html += `</div>`;

  // ── Section 2: Full Year Sales Chart ──
  html += `<div class="card"><div class="card-title">Brand Sales — 2026 vs 2025</div>`;
  html += `<div style="position:relative;height:280px"><canvas id="traj-sales-full"></canvas></div></div>`;

  // ── Section 3: Full Year Orders Chart ──
  html += `<div class="card"><div class="card-title">Brand Orders — 2026 vs 2025</div>`;
  html += `<div style="position:relative;height:220px"><canvas id="traj-orders-full"></canvas></div></div>`;

  // ── Section 4: Rolling Period Summary Table ──
  html += `<div class="card"><div class="card-title">Period Performance Summary</div>`;
  const periodSummaries = [];
  S.data.availablePeriods.forEach(per => {
    const pt = getPeriodTotals(per);
    if (pt) periodSummaries.push(pt);
  });
  if (periodSummaries.length) {
    html += `<div class="table-wrap"><table class="data-table" id="traj-period-summary"><thead><tr>`;
    html += `<th>Period</th><th>Sales</th><th>vs PY</th><th>Orders</th><th>vs PY</th><th>Avg Check</th><th>Food Cost %</th><th>All-In Labor %</th><th>EBITDA %</th><th>Guest Score</th>`;
    html += `</tr></thead><tbody>`;
    periodSummaries.forEach((pt, idx) => {
      const isCurrent = pt.period === S.data.currentPeriod;
      const periodLabel = isCurrent ? pt.period + ' (PTD)' : pt.period;
      const prev = idx > 0 ? periodSummaries[idx - 1] : null;
      function trendArrow(curr, prevVal) {
        if (curr == null || prevVal == null) return '';
        if (curr > prevVal * 1.005) return ' <span style="color:var(--green);font-size:10px">▲</span>';
        if (curr < prevVal * 0.995) return ' <span style="color:var(--red);font-size:10px">▼</span>';
        return '';
      }
      html += `<tr>`;
      html += `<td style="font-weight:600">${periodLabel}</td>`;
      html += `<td>${fmt$(pt.sales)}${trendArrow(pt.sales, prev?.sales)}</td>`;
      html += `<td><span style="color:${chgColor(pt.salesYoY)}">${fmtChg(pt.salesYoY)}</span></td>`;
      html += `<td>${(pt.orders||0).toLocaleString()}${trendArrow(pt.orders, prev?.orders)}</td>`;
      html += `<td><span style="color:${chgColor(pt.ordersYoY)}">${fmtChg(pt.ordersYoY)}</span></td>`;
      html += `<td>${fmt$(pt.avgCheck)}${trendArrow(pt.avgCheck, prev?.avgCheck)}</td>`;
      html += `<td>${pt.foodCostPct != null ? fmtPct(pt.foodCostPct) : '—'}${trendArrow(prev?.foodCostPct, pt.foodCostPct)}</td>`;
      html += `<td>${pt.laborPct != null ? fmtPct(pt.laborPct) : '—'}${trendArrow(prev?.laborPct, pt.laborPct)}</td>`;
      html += `<td>${pt.ebitdaPct != null ? fmtPct(pt.ebitdaPct) : '—'}${trendArrow(pt.ebitdaPct, prev?.ebitdaPct)}</td>`;
      html += `<td>${pt.guestScore != null ? '<span style="color:' + guestScoreColor(pt.guestScore) + ';font-weight:700">' + pt.guestScore + '</span>' : '—'}${trendArrow(pt.guestScore, prev?.guestScore)}</td>`;
      html += `</tr>`;
    });
    html += `</tbody></table></div>`;
  }
  html += `</div>`;

  // ── Section 5: Period Deep Dive Comparison ──
  html += `<div class="card"><div class="card-title" style="display:flex;justify-content:space-between;align-items:center">`;
  html += `<span>Period Comparison — ${selPeriod} · 2026 vs 2025</span>`;
  html += `<select class="period-sel" onchange="S.trajectoryPeriod=this.value;renderTrajectory()">`;
  S.data.availablePeriods.forEach(p => {
    html += `<option value="${p}" ${p === selPeriod ? 'selected' : ''}>${p}</option>`;
  });
  html += `</select></div>`;

  const selPerNum = parseInt(selPeriod.replace('P', ''));
  const selPerWeeks = S.data.availableWeeks.filter(w => S.data.weekToPeriod[w] === selPeriod);
  const allStores = S.data.stores.map(s => s.name);
  let cur26Sales = 0, cur26Orders = 0;
  selPerWeeks.forEach(w => {
    allStores.forEach(store => {
      const st = S.computed.storeTotals[store]?.[w];
      if (st) { cur26Sales += st.sales; cur26Orders += st.orders; }
    });
  });
  const cur26Check = cur26Orders > 0 ? cur26Sales / cur26Orders : 0;
  const pyRows = S.data.priorYear.filter(r => r.period === selPerNum && r.type === 'Destination');
  const py25Sales = pyRows.reduce((s, r) => s + (r.sales || 0), 0);
  const py25Orders = pyRows.reduce((s, r) => s + (r.orders || 0), 0);
  const py25Check = py25Orders > 0 ? py25Sales / py25Orders : 0;

  const compareMetrics = [
    {label:'Sales', v26:cur26Sales, v25:py25Sales, fmt:'$'},
    {label:'Orders', v26:cur26Orders, v25:py25Orders, fmt:'n'},
    {label:'Avg Check', v26:cur26Check, v25:py25Check, fmt:'$'}
  ];

  html += `<table class="compare-table"><thead><tr><th>Metric</th><th>2026</th><th>2025</th><th>Change</th></tr></thead><tbody>`;
  compareMetrics.forEach(m => {
    const chg = m.v25 > 0 ? (m.v26 - m.v25) / m.v25 : null;
    const v26Str = m.fmt === '$' ? fmt$(m.v26) : (m.v26 || 0).toLocaleString();
    const v25Str = m.fmt === '$' ? fmt$(m.v25) : (m.v25 || 0).toLocaleString();
    html += `<tr><td style="font-weight:600">${m.label}</td><td>${v26Str}</td><td>${v25Str}</td>`;
    html += `<td><span style="color:${chgColor(chg)}">${fmtChg(chg)}</span></td></tr>`;
  });
  html += `</tbody></table></div>`;

  document.getElementById('content').innerHTML = html;

  // ── Render Charts ──
  setTimeout(() => {
    // Build full 52-week x-axis
    const allWeekNums = [];
    for (let w = 1; w <= 52; w++) allWeekNums.push(w);
    const xLabels = allWeekNums.map(w => {
      const per = S.data.weekToPeriod[w];
      // Show period label at period boundaries (w1 of each period)
      if (per) {
        const perWeeks = allWeekNums.filter(ww => S.data.weekToPeriod[ww] === per);
        if (perWeeks.length && perWeeks[0] === w) return per;
      }
      return '';
    });

    const data2025Sales = allWeekNums.map(w => S.computed.brandHistory2025[w]?.sales || null);
    const data2026Sales = allWeekNums.map(w => S.computed.brandTotals[w]?.sales || null);
    const data2025Orders = allWeekNums.map(w => S.computed.brandHistory2025[w]?.orders || null);
    const data2026Orders = allWeekNums.map(w => S.computed.brandTotals[w]?.orders || null);

    // Sales chart
    const salesDatasets = [
      {label:'2025', data:data2025Sales, color:'var(--chart-2025)', style:'dashed'},
      {label:'2026', data:data2026Sales, color:'var(--chart-2026)', style:'solid'}
    ];
    if (S.features.hasSeasonality) {
      const bh25Dest = S.data.brandHistory.filter(r => r.fiscalYear === 2025 && r.type === 'Destination');
      const annualSales = bh25Dest.reduce((s, r) => s + r.sales, 0);
      const weeklyAvg = annualSales / 52;
      const seasonalData = allWeekNums.map(w => {
        const si = S.data.seasonality.find(r => r.fw === w);
        return si ? weeklyAvg * si.salesIndex : null;
      });
      salesDatasets.push({label:'Seasonal Expectation', data:seasonalData, color:'var(--chart-seasonal)', style:'dotted'});
    }
    createTrendChart('traj-sales-full', {
      labels: xLabels, datasets: salesDatasets,
      yAxisFormat:'currency', yAxisLabel:'Sales', showLegend:true
    });

    // Orders chart
    createTrendChart('traj-orders-full', {
      labels: xLabels,
      datasets: [
        {label:'2025', data:data2025Orders, color:'var(--chart-2025)', style:'dashed'},
        {label:'2026', data:data2026Orders, color:'var(--chart-2026)', style:'solid'}
      ],
      yAxisFormat:'number', yAxisLabel:'Orders', showLegend:true
    });
  }, 0);
}

/* ═══════════════════════════════════════════════════════════════════
   AUTO-FETCH FROM ONEDRIVE
   ═══════════════════════════════════════════════════════════════════ */
const DATA_URL = 'https://rr-data-proxy.nathanlbreneman.workers.dev';

function showManualUpload(errorMsg) {
  document.getElementById('autoLoadMsg').style.display = 'none';
  const manual = document.getElementById('manualUpload');
  manual.style.display = 'block';
  manual.style.cursor = 'pointer';
  if (errorMsg) {
    const p = document.createElement('p');
    p.style.cssText = 'font-size:11px;color:var(--red);margin-top:8px';
    p.textContent = errorMsg;
    manual.appendChild(p);
  }
}

async function autoFetchData() {
  const loadBar = document.getElementById('loadBar');
  const autoMsg = document.getElementById('autoLoadMsg');
  autoMsg.style.display = 'block';
  document.getElementById('manualUpload').style.display = 'none';
  loadBar.style.width = '30%';

  try {
    const response = await fetch(DATA_URL);
    loadBar.style.width = '60%';
    if (!response.ok) throw new Error('Download failed: ' + response.status);
    const buffer = await response.arrayBuffer();
    loadBar.style.width = '90%';
    const wb = XLSX.read(new Uint8Array(buffer), {type:'array', cellDates:true});
    loadBar.style.width = '100%';
    parseWorkbook(wb);
  } catch(err) {
    console.warn('Auto-fetch failed:', err.message);
    showManualUpload('Auto-load unavailable — drag your file below or click to browse');
  }
}

// Launch auto-fetch on page load
autoFetchData();
