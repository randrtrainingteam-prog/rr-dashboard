<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R&R BBQ — Weekly Intelligence Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg: #FAF8F5;
  --card: #FFFFFF;
  --card2: #F7F5F2;
  --border: #E8E0D8;
  --text: #2C2420;
  --muted: #8C7B6B;
  --gold: #C4922A;
  --gold-light: #F5EDDB;
  --brown: #5C3D2E;
  --brown-light: #8B6F5E;
  --green: #2D8F4E;
  --green-bg: #E8F5EC;
  --red: #C0392B;
  --red-bg: #FBEAEA;
  --yellow: #D4A017;
  --yellow-bg: #FFF8E1;
  --blue: #2E6B9E;
  --chart-2026: #C4922A;
  --chart-2025: #9EAAB5;
  --chart-seasonal: #D4A017;
  --chart-budget: #C0392B;
  --chart-brand: #8C7B6B;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Calibri','Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); font-size:13px; }

/* ── Top Bar ── */
.top-bar { display:flex; align-items:center; justify-content:space-between; padding:12px 24px; background:var(--card); border-bottom:1px solid var(--border); flex-wrap:wrap; gap:10px; }
.brand { display:flex; align-items:baseline; gap:10px; }
.brand-name { font-size:18px; font-weight:700; color:var(--brown); }
.brand-sub { font-size:12px; font-weight:400; color:var(--muted); }
.district-filter { display:flex; gap:4px; }
.district-btn { border:1px solid var(--border); border-radius:4px; padding:4px 14px; font-size:12px; background:transparent; color:var(--text); cursor:pointer; font-family:inherit; }
.district-btn.active { background:var(--brown); color:#fff; border-color:var(--brown); }
.week-select-wrap { display:flex; align-items:center; gap:6px; }
.week-select-wrap label { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; }
.week-select-wrap select { padding:4px 8px; border:1px solid var(--border); border-radius:4px; font-size:12px; font-family:inherit; background:var(--card); }
.reload-btn { display:none; border:1px solid var(--border); border-radius:4px; padding:4px 10px; font-size:11px; background:transparent; color:var(--muted); cursor:pointer; font-family:inherit; }
.reload-btn:hover { background:var(--gold-light); }

/* ── Tabs ── */
.tab-bar { display:flex; background:var(--card); border-bottom:1px solid var(--border); padding:0 24px; overflow-x:auto; }
.tab-btn { border:none; border-bottom:2px solid transparent; padding:10px 20px; background:transparent; font-size:13px; font-weight:600; color:var(--muted); cursor:pointer; font-family:inherit; white-space:nowrap; }
.tab-btn.active { border-bottom-color:var(--gold); color:var(--gold); font-weight:700; }
.tab-btn:hover:not(.active) { color:var(--text); }

/* ── Upload ── */
.upload-zone { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:340px; border:2px dashed var(--border); border-radius:12px; margin:32px 24px; padding:40px; text-align:center; cursor:pointer; transition:border-color .2s, background .2s; }
.upload-zone:hover, .upload-zone.dragover { border-color:var(--gold); background:var(--gold-light); }
.upload-zone h2 { font-size:16px; font-weight:700; color:var(--brown); margin-bottom:6px; }
.upload-zone p { font-size:12px; color:var(--muted); }
.upload-zone.hidden { display:none; }

/* ── Content ── */
#content { padding:20px 24px; }

/* ── Cards ── */
.card { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:20px; margin-bottom:16px; }
.card-title { font-size:11px; text-transform:uppercase; letter-spacing:1px; font-weight:700; color:var(--muted); margin-bottom:12px; }

/* ── KPI Tiles ── */
.kpi-row { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:16px; }
.kpi-tile { flex:1; min-width:160px; background:var(--card); border:1px solid var(--border); border-radius:8px; padding:16px; }
.kpi-tile.large .kpi-value { font-size:34px; }
.kpi-label { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:4px; }
.kpi-value { font-size:28px; font-weight:700; color:var(--text); line-height:1.2; }
.kpi-change { font-size:11px; margin-top:4px; display:flex; align-items:center; gap:4px; }
.kpi-subtitle { font-size:11px; color:var(--muted); margin-top:4px; }

/* ── Tables ── */
.table-wrap { overflow-x:auto; }
table.data-table { width:100%; border-collapse:collapse; }
table.data-table thead th { background:var(--brown); color:#fff; text-align:left; padding:8px 10px; font-size:11px; font-weight:700; text-transform:uppercase; cursor:pointer; user-select:none; white-space:nowrap; }
table.data-table thead th:hover { background:var(--brown-light); }
table.data-table tbody td { padding:8px 10px; border-bottom:1px solid var(--border); font-size:13px; }
table.data-table tbody tr:nth-child(even) { background:var(--card2); }
table.data-table tbody tr:hover { background:var(--gold-light); }
table.data-table tbody tr.highlight { background:var(--gold-light); font-weight:600; }
table.data-table .group-header td { background:var(--brown); color:#fff; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; padding:6px 10px; }

/* ── Alert Rows ── */
.alert-row { display:flex; align-items:flex-start; gap:10px; padding:10px 14px; margin-bottom:6px; border-radius:6px; }
.alert-row.red { border-left:3px solid var(--red); background:var(--red-bg); }
.alert-row.yellow { border-left:3px solid var(--yellow); background:var(--yellow-bg); }
.alert-row.green { border-left:3px solid var(--green); background:var(--green-bg); }
.alert-headline { font-weight:700; font-size:13px; }
.alert-detail { font-size:12px; color:var(--muted); margin-top:2px; }
.alert-impact { font-size:11px; font-weight:600; margin-top:4px; }

/* ── Validation ── */
.validation-summary { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:20px; max-width:600px; margin:40px auto; }
.validation-summary h3 { font-size:14px; font-weight:700; margin-bottom:10px; color:var(--brown); }
.validation-summary .row { display:flex; justify-content:space-between; padding:4px 0; font-size:12px; }
.validation-summary .label { color:var(--muted); }
.validation-summary .value { font-weight:600; }
.validation-summary .warn { color:var(--yellow); }

/* ── Responsive ── */
/* ── Store Scorecard: Deep Dive ── */
.dive-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 16px; border-left: 3px solid var(--gold); }
.dive-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
.dive-close { background: none; border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; cursor: pointer; font-size: 14px; color: var(--muted); }
.dive-close:hover { background: var(--card2); color: var(--text); }
.narrative-card { background: var(--gold-light); border: 1px solid var(--border); border-radius: 8px; padding: 16px 20px; margin-bottom: 16px; font-size: 14px; line-height: 1.6; color: var(--text); }
.decomp-sentence { font-size: 15px; text-align: center; padding: 12px 20px; color: var(--text); line-height: 1.5; }
.season-note { font-size: 12px; font-style: italic; text-align: center; color: var(--muted); padding: 4px 20px 8px; }
.chart-row { display: flex; gap: 16px; margin-bottom: 16px; }
.chart-row > div { flex: 1; min-width: 0; }
.alert-store-link { color: inherit; text-decoration: none; border-bottom: 1px dashed var(--muted); cursor: pointer; }
.alert-store-link:hover { color: var(--gold); border-bottom-color: var(--gold); }
.green-stores-note { font-size: 12px; color: var(--muted); padding: 8px 14px; }
.district-summary-table td { padding: 8px 12px; font-size: 13px; }
.dim-bar { display: flex; align-items: center; gap: 4px; }
.dim-track { width: 40px; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.dim-fill { height: 100%; border-radius: 3px; }
.dim-score { font-size: 11px; min-width: 16px; }
.cost-narrative { font-size: 13px; color: var(--text); padding: 10px 16px; background: var(--card2); border-radius: 6px; margin-top: 8px; }
.leading-warn { background: var(--yellow-bg); border: 1px solid var(--yellow); border-radius: 6px; padding: 10px 14px; font-size: 13px; margin: 8px 0; }
.leading-ok { font-size: 12px; color: var(--muted); padding: 4px 0; }

/* Budget progress bar */
.budget-progress { background: var(--border); height: 8px; border-radius: 4px; overflow: hidden; margin: 8px 0; }
.budget-progress-fill { background: var(--gold); height: 100%; border-radius: 4px; transition: width 0.3s; }
.budget-progress-label { font-size: 11px; color: var(--muted); text-align: center; margin-top: 4px; }

/* Period selector */
.period-sel { padding: 4px 10px; border: 1px solid var(--border); border-radius: 4px; font-size: 12px; background: var(--card); color: var(--text); cursor: pointer; font-family: inherit; }
.period-sel:focus { outline: none; border-color: var(--gold); }

/* Waterfall labels */
.waterfall-summary { display: flex; gap: 16px; flex-wrap: wrap; font-size: 12px; color: var(--text); padding: 8px 0; justify-content: center; }
.waterfall-summary span { white-space: nowrap; }

/* Comparison table */
.compare-table { width: 100%; border-collapse: collapse; }
.compare-table th { background: var(--brown); color: white; padding: 8px 12px; text-align: left; font-size: 11px; text-transform: uppercase; }
.compare-table td { padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
.compare-table tr:nth-child(even) td { background: var(--card2); }

/* Envelope headroom */
.headroom-pos { color: var(--green); font-weight: 600; }
.headroom-neg { color: var(--red); font-weight: 600; }

/* ── Responsive ── */
@media (max-width:768px) {
  .kpi-row { flex-direction:column; }
  .kpi-tile { min-width:auto; }
  .top-bar { flex-direction:column; align-items:flex-start; }
  .tab-bar { padding:0 12px; }
  .tab-btn { padding:8px 12px; font-size:12px; }
  #content { padding:12px; }
  .kpi-value { font-size:22px; }
  .chart-row { flex-direction:column; }
}

/* Menu toggle */
.menu-toggle { display: flex; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
.menu-toggle button { padding: 6px 16px; font-size: 12px; font-weight: 600; border: none; cursor: pointer; transition: all 0.15s; }
.menu-toggle button.active { background: var(--brown); color: white; }
.menu-toggle button:not(.active) { background: var(--card); color: var(--text); }
.menu-toggle button:not(.active):hover { background: var(--card2); }

/* Plate color swatches */
.plate-swatch { display: inline-block; width: 12px; height: 12px; border-radius: 2px; margin-right: 8px; vertical-align: middle; }

/* Cannibalization narrative */
.cannibal-narrative { font-size: 13px; color: var(--text); padding: 10px 16px; background: var(--card2); border-radius: 6px; margin-top: 8px; line-height: 1.5; }

/* New item badge */
.new-badge { background: var(--gold-light); color: var(--gold); font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 3px; text-transform: uppercase; }

/* Section separator for menu sections */
.menu-section { margin-bottom: 24px; }
</style>
</head>
<body>

<!-- Top Bar -->
<div class="top-bar">
  <div class="brand">
    <span class="brand-name">R&R BBQ</span>
    <span class="brand-sub">Weekly Intelligence Dashboard</span>
    <button class="reload-btn" id="reloadBtn" onclick="resetUpload()">Refresh Data</button>
  </div>
  <div class="district-filter" id="districtFilter" style="display:none">
    <button class="district-btn active" data-district="All" onclick="setDistrict('All')">All</button>
    <button class="district-btn" data-district="North" onclick="setDistrict('North')">North</button>

<!-- Tab Bar -->
<div class="tab-bar" id="tabBar" style="display:none">

  <button class="tab-btn" data-tab="traffic" onclick="setTab('traffic')">Traffic & Channels</button>

</div>

<!-- Upload Zone -->
<div class="upload-zone" id="uploadZone">
  <div id="autoLoadMsg">
    <h2>Loading latest data...</h2>
    <p>Fetching Weekly Fact Table from OneDrive</p>
    <div style="width:200px;height:4px;background:var(--border);border-radius:2px;margin:16px auto;overflow:hidden"><div id="loadBar" style="width:0%;height:100%;background:var(--gold);border-radius:2px;transition:width 0.5s"></div></div>
  </div>
  <div id="manualUpload" style="display:none" onclick="document.getElementById('fileInput').click()">
    <h2>Drop your Weekly Fact Table Excel file here</h2>
    <p>or click to browse — auto-load unavailable</p>
    <p style="margin-top:8px"><a href="https://ffgoffice-my.sharepoint.com/:x:/g/personal/nbreneman_randrbbq_com/IQD77gLBVq6IT4W1m06sVdeVAa5aPNLhFdXRBy-xf-YhBsI?e=jhtxPd" target="_blank" style="color:var(--gold);font-size:12px">Download latest Excel from OneDrive ↗</a></p>
  </div>
  <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none" onchange="handleFile(this.files[0])">
</div>

<!-- Content -->
<div id="content"></div>

<script>
/* ═══════════════════════════════════════════════════════════════════
   SECTION 3 — STATE
   ═══════════════════════════════════════════════════════════════════ */
const S = {
  tab: 'command',
  week: null,
  district: 'All',
  store: null,
  menuView: 'Period',
  menuPeriod: null,
  trajectoryPeriod: null,
  data: {
    weekly:[], budget:[], brandHistory:[], seasonality:[], channelSeasonality:[],
    pmixPeriod2026:[], pmixPeriod2025:[], pmixWeekly2026:[], pmixWeekly2025:[],
    priorYear:[], stores:[], calendar:[], salary:[],
    availableWeeks:[], availablePeriods:[], currentPeriod:null, weekToPeriod:{}
  },
  features: { hasSeasonality:false, hasChannelSeasonality:false, hasPmixWeekly:false, hasSalary:false },
  computed: {}
};

/* ═══════════════════════════════════════════════════════════════════
   SECTION 4 — CONFIGURATION
   ═══════════════════════════════════════════════════════════════════ */
const CONFIG = {
  districts: {
    'North': ['Salt Lake City','South Jordan','Farmington','North Salt Lake','Midvale','Boise','Meridian'],
    'South': ['Lehi','Pleasant Grove','Provo','Spanish Fork','Riverton']
  },
  destinationChannels: ['Dine-in','Marketplace','Dine-in To Go','Online Orders','Catering','Drive Thru','Olo Dispatch','Call-In','Vending'],
  materialChannels: ['Dine-in','Marketplace','Dine-in To Go','Online Orders','Catering'],
  dayparts: ['11am','2pm','5pm'],
  daypartLabels: {'6am':'Early / Catering Prep','11am':'Lunch','2pm':'Afternoon','5pm':'Dinner'},
  allDayparts: ['6am','11am','2pm','5pm'],
  weeksPerPeriod: 4,
  periodsPerYear: 13,
  thresholds: {
    guestScoreRed: 60, guestScoreGreen: 75,
    consecutiveOrderDeclineWeeks: 2,
    foodCostOverBudgetPct: 0.02,
    cateringDeclinePct: -0.15,
    channelMixShiftPct: 0.03
  },
  ratingAnchors: [
    {value:3.7,score:0},{value:4.0,score:15},{value:4.2,score:25},
    {value:4.4,score:32},{value:4.6,score:38},{value:4.7,score:40}
  ],
  lowPctAnchors: [
    {value:0,score:40},{value:0.10,score:32},{value:0.18,score:22},
    {value:0.25,score:10},{value:0.35,score:4},{value:0.40,score:0}
  ],
  responseAnchors: [
    {value:0,score:0},{value:0.50,score:3},{value:0.70,score:6},
    {value:0.90,score:9},{value:1.0,score:10}
  ],
  volumeBonusMedian: 41,
  volumeBonusMax: 5,
  smoothingWeights: [0.50, 0.30, 0.20],
  rankDimensions: {
    salesMomentum: {max:20, label:'Sales Momentum'},
    trafficDirection: {max:25, label:'Traffic Direction'},
    costDiscipline: {max:20, label:'Cost Discipline'},
    guestHealth: {max:15, label:'Guest Health'},
    budgetPace: {max:20, label:'Budget Pace'}
  },
  itemClassifier: {
    ENTREE_PLATE:['meat plate','r&r plate','founders platter','uvu meat'],
    ENTREE_SANDWICH:['pulled pork sandwich','pineapple pork sand','caveman burger','cheese burger','chicken sandwich','turkey sandwich','chopped brisket sand','sliced brisket sand','r&r sandwich bar'],
    ENTREE_VALUE:['buddy bowl','taco trio','bbq burrito','brisket tacos','bbq pork tacos','bbq chicken tacos','rib tip'],
    ENTREE_OTHER:['half rack','smoked wings','wing special','nachos','cobb salad','brisket salad','chicken salad','pulled pork salad','bbq salad','pork mac','brisket nacho','chicken nacho','pork nacho','bbq box'],
    SIDE:['mac and cheese','mac & cheese','bbq beans','french fries','sweet potato fries','coleslaw','creamed corn','potato salad','garlic masher','mashed potato','hush pup','fried pickle','garden salad','side salad','cornbread','dinner roll','dozen roll','onion ring','jalapen','chips & queso','original bbq sauce'],
    LOADED_SIDE:['baked potato'],
    DESSERT:['cobbler','peach cobbler','pudding','banana pudding','cookie','brownie'],
    DRINK:['soda',' tea','lemonade','water','coke','sprite','dr pepper','root beer','fanta','mello','pepsi','coffee','juice','drink'],
    KIDS:['kids '],
    BY_THE_POUND:['1#','1/2#','1 lb','per pound','by the pound'],
    FAMILY_PACK:['family meal','wings pack','smoked wings pack'],
    MODIFIER:['brisket - sliced','brisket - chopped','c-2 meat brisket','pulled pork -','turkey -','sausage -','chicken -','pork loin -','boneless chicken -','ribs -'],
    CATERING_ITEM:['c- r&r','c- dozen','c- mac','e-half','e-pork','fmp'],
    NON_FOOD:['gift card','doordash driver tip','doordash delivery fee','delivery fee','discount','merch','void','comp ']
  },
  signalPatterns: {
    BALANCED_GROWTH: {salesUp:true, ordersUp:true, label:'Balanced Growth', color:'var(--green)'},
    CHECK_INFLATION: {salesUp:true, ordersUp:false, label:'Check Inflation', color:'var(--yellow)'},
    CHECK_EROSION:   {salesUp:false, ordersUp:true, label:'Check Erosion', color:'var(--blue)'},
    DECLINE:         {salesUp:false, ordersUp:false, label:'Decline', color:'var(--red)'}
  },
  defaultPayrollTaxRate: 0.125
};

/* ═══════════════════════════════════════════════════════════════════
   SECTION 7 — FORMATTING UTILITIES
   ═══════════════════════════════════════════════════════════════════ */
function fmt$(v) {
  if (v == null || isNaN(v)) return '—';
  const abs = Math.abs(v);
  if (abs >= 1000) return (v < 0 ? '-' : '') + '$' + Math.round(abs).toLocaleString();
  return (v < 0 ? '-' : '') + '$' + abs.toFixed(2);
}
function fmtPct(v) {
  if (v == null || isNaN(v)) return '—';
  return (v * 100).toFixed(1) + '%';
}
function fmtChg(v) {
  if (v == null || isNaN(v)) return '—';
  const s = (v * 100).toFixed(1);
  return (v > 0 ? '+' : '') + s + '%';
}
function chgArrow(v) {
  if (v == null || isNaN(v)) return '—';
  if (v > 0.005) return '▲';
  if (v < -0.005) return '▼';
  return '—';
}
function chgColor(v) {
  if (v == null || isNaN(v)) return 'var(--muted)';
  if (v > 0.005) return 'var(--green)';
  if (v < -0.005) return 'var(--red)';
  return 'var(--muted)';
}
function signalLabel(s) {
  const p = CONFIG.signalPatterns[s];
  if (!p) return {label:'—', color:'var(--muted)', bgColor:'transparent'};
  const bgMap = {'var(--green)':'var(--green-bg)','var(--red)':'var(--red-bg)','var(--yellow)':'var(--yellow-bg)','var(--blue)':'#EBF2F8'};
  return {label:p.label, color:p.color, bgColor: bgMap[p.color]||'transparent'};
}
function guestScoreColor(score) {
  if (score == null) return 'var(--muted)';
  if (score >= CONFIG.thresholds.guestScoreGreen) return 'var(--green)';
  if (score >= CONFIG.thresholds.guestScoreRed) return 'var(--yellow)';
  return 'var(--red)';
}
function ordinal(n) {
  const s = ['th','st','nd','rd'], v = n % 100;
  return n + (s[(v-20)%10]||s[v]||s[0]);
}

/* ═══════════════════════════════════════════════════════════════════
   SECTION 8 — CHART FACTORY
   ═══════════════════════════════════════════════════════════════════ */
const _colorCache = {};
function resolveColor(cssVar) {
  if (_colorCache[cssVar]) return _colorCache[cssVar];
  const key = cssVar.replace(/^var\(--/, '').replace(/\)$/, '');
  const raw = getComputedStyle(document.documentElement).getPropertyValue('--' + key).trim();
  _colorCache[cssVar] = raw || cssVar;
  return _colorCache[cssVar];
}
const _charts = {};
function destroyChart(id) { if (_charts[id]) { _charts[id].destroy(); delete _charts[id]; } }

function createTrendChart(canvasId, cfg) {
  destroyChart(canvasId);
  const ctx = document.getElementById(canvasId);
  if (!ctx) return null;
  const styleMap = {solid:[], dashed:[6,4], dotted:[2,3]};
  const datasets = cfg.datasets.map(ds => ({
    label: ds.label,
    data: ds.data,
    borderColor: resolveColor(ds.color),
    backgroundColor: resolveColor(ds.color) + '18',
    borderWidth: ds.style === 'solid' ? 2.5 : 1.8,
    borderDash: styleMap[ds.style] || [],
    pointRadius: ds.style === 'solid' ? 4 : 0,
    pointBackgroundColor: resolveColor(ds.color),
    tension: 0.3,
    fill: false
  }));
  const yFmt = cfg.yAxisFormat === 'currency' ? v => fmt$(v) :
               cfg.yAxisFormat === 'percent' ? v => fmtPct(v) :
               v => v?.toLocaleString();
  _charts[canvasId] = new Chart(ctx, {
    type: 'line',
    data: { labels: cfg.labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: cfg.showLegend !== false, position:'bottom', labels:{ font:{family:'Calibri',size:11}, boxWidth:20, padding:12 } },

             title:{ display:!!cfg.yAxisLabel, text:cfg.yAxisLabel||'', font:{family:'Calibri',size:11} } }
      }
    }
  });
  return _charts[canvasId];
}

function createBarChart(canvasId, cfg) {

function createHeatMap(canvasId, cfg) {
  destroyChart(canvasId);
  const canvas = document.getElementById(canvasId);
  if (!canvas) return null;
  const ctx2d = canvas.getContext('2d');
  const {rows, cols, data, cellWidth, cellHeight, format} = cfg;
  const marginLeft = 100, marginTop = 30;
  canvas.width = marginLeft + cols.length * cellWidth;
  canvas.height = marginTop + rows.length * cellHeight;
  ctx2d.font = '11px Calibri';
  cols.forEach((c,i) => { ctx2d.fillStyle = '#8C7B6B'; ctx2d.textAlign = 'center'; ctx2d.fillText(c, marginLeft + i*cellWidth + cellWidth/2, marginTop - 8); });
  rows.forEach((r,ri) => {
    ctx2d.fillStyle = '#2C2420'; ctx2d.textAlign = 'right'; ctx2d.fillText(r, marginLeft - 8, marginTop + ri*cellHeight + cellHeight/2 + 4);
    cols.forEach((c,ci) => {
      const v = data[ri]?.[ci] ?? 0;
      const intensity = Math.min(1, Math.max(0, v));
      const r2 = Math.round(196 - intensity * 152), g2 = Math.round(146 + intensity * 0), b2 = Math.round(42 + intensity * 0);
      ctx2d.fillStyle = `rgba(${196-Math.round(intensity*50)}, ${146+Math.round(intensity*50)}, ${42+Math.round(intensity*5)}, ${0.2+intensity*0.7})`;
      ctx2d.fillRect(marginLeft + ci*cellWidth + 1, marginTop + ri*cellHeight + 1, cellWidth - 2, cellHeight - 2);
      ctx2d.fillStyle = intensity > 0.6 ? '#fff' : '#2C2420';
      ctx2d.textAlign = 'center';
      const label = format === 'percent' ? fmtPct(v) : format === 'currency' ? fmt$(v) : v.toFixed(1);
      ctx2d.fillText(label, marginLeft + ci*cellWidth + cellWidth/2, marginTop + ri*cellHeight + cellHeight/2 + 4);
    });
  });
  return null;
}

function kpiTile(cfg) {

/* ═══════════════════════════════════════════════════════════════════
   SECTION 10 — SORTABLE TABLE BUILDER
   ═══════════════════════════════════════════════════════════════════ */
const _tableSorts = {};
function sortableTable(cfg) {
  const tid = cfg.id || 'tbl-' + Math.random().toString(36).slice(2,8);
  if (!_tableSorts[tid]) _tableSorts[tid] = cfg.defaultSort || {key:cfg.headers[0]?.key, dir:'asc'};
  const sort = _tableSorts[tid];
  let rows = [...cfg.rows];
  if (sort.key) {
    rows.sort((a,b) => {
      let va = a[sort.key], vb = b[sort.key];
      if (va == null) va = -Infinity; if (vb == null) vb = -Infinity;
      if (typeof va === 'string') return sort.dir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
      return sort.dir === 'asc' ? va - vb : vb - va;
    });
  }
  function fmtCell(val, format) {
    if (val == null) return '—';
    switch(format) {
      case 'currency': return fmt$(val);
      case 'changePct': return `<span style="color:${chgColor(val)}">${chgArrow(val)} ${fmtChg(val)}</span>`;
      case 'percent': return fmtPct(val);
      case 'number': return typeof val === 'number' ? val.toLocaleString() : val;
      case 'score': return `<span style="color:${guestScoreColor(val)};font-weight:700">${val}</span>`;
      case 'rank': return ordinal(val);
      case 'signal': { const s = signalLabel(val); return `<span style="color:${s.color};background:${s.bgColor};padding:2px 8px;border-radius:3px;font-size:11px;font-weight:600">${s.label}</span>`; }
      default: return val;
    }
  }
  let html = `<div class="table-wrap"><table class="data-table" id="${tid}"><thead><tr>`;
  cfg.headers.forEach(h => {
    const arrow = sort.key === h.key ? (sort.dir === 'asc' ? ' ↑' : ' ↓') : '';
    const sortAttr = h.sortable !== false ? ` onclick="tableSort('${tid}','${h.key}')"` : '';
    const w = h.width ? ` style="width:${h.width}${h.align ? ';text-align:'+h.align : ''}"` : (h.align ? ` style="text-align:${h.align}"` : '');
    html += `<th${w}${sortAttr}>${h.label}${arrow}</th>`;
  });
  html += '</tr></thead><tbody>';
  if (cfg.groupBy && cfg.groupOrder) {
    cfg.groupOrder.forEach(g => {
      html += `<tr class="group-header"><td colspan="${cfg.headers.length}">${g}</td></tr>`;
      rows.filter(r => r[cfg.groupBy] === g).forEach(r => { html += renderRow(r, cfg, tid); });
    });
  } else {
    rows.forEach(r => { html += renderRow(r, cfg, tid); });
  }
  html += '</tbody></table></div>';
  return html;

  function renderRow(r, cfg, tid) {
    const hl = cfg.highlightRow && cfg.highlightRow(r) ? ' class="highlight"' : '';
    const click = cfg.onRowClick ? ` onclick="${cfg.onRowClick.name}('${r.store||r.name||''}')" style="cursor:pointer"` : '';
    let row = `<tr${hl}${click}>`;
    cfg.headers.forEach(h => {
      const align = h.align ? ` style="text-align:${h.align}"` : '';
      row += `<td${align}>${fmtCell(r[h.key], h.format)}</td>`;
    });
    row += '</tr>';
    return row;
  }
}
function tableSort(tid, key) {
  const s = _tableSorts[tid];
  if (s.key === key) s.dir = s.dir === 'asc' ? 'desc' : 'asc';
  else { s.key = key; s.dir = 'asc'; }
  renderTab();
}

const uploadZone = document.getElementById('uploadZone');
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => { e.preventDefault(); uploadZone.classList.remove('dragover'); if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]); });

function handleFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, {type:'array', cellDates:true});
      parseWorkbook(wb);
    } catch(err) {
      document.getElementById('content').innerHTML = `<div class="card" style="color:var(--red)">Error parsing file: ${err.message}</div>`;
    }
  };
  reader.readAsArrayBuffer(file);
}

function parseWorkbook(wb) {
  const requiredTabs = ['Weekly_Fact_Table','Budget_Fact_Table','Brand_Weekly_History','Prior_Year_Fact_Table','Store_List','Fiscal_Calendar'];
  const optionalTabs = ['Seasonality_Index','Channel_Seasonality_Index','Brink_Pmix_Import_2026','Brink_Pmix_Import_2025','Brink_Pmix_Weekly_2026','Brink_Pmix_Weekly_2025','Store_Salary'];
  const found = wb.SheetNames;
  const missing = requiredTabs.filter(t => !found.includes(t));
  if (missing.length) { document.getElementById('content').innerHTML = `<div class="card" style="color:var(--red)">Missing required tabs: ${missing.join(', ')}</div>`; return; }

  function sheet(name) {
    if (!found.includes(name)) return [];
    return XLSX.utils.sheet_to_json(wb.Sheets[name]).map(row => {
      const clean = {};
      Object.keys(row).forEach(k => { clean[k.trim()] = row[k]; });
      return clean;
    });
  }
  function num(v) { return typeof v === 'number' ? v : (parseFloat(v) || 0); }
  function numOrNull(v) { return v == null || v === '' ? null : (typeof v === 'number' ? v : parseFloat(v)); }
  function cleanCurrency(v) {
    if (v == null) return 0;
    if (typeof v === 'number') return v;
    return parseFloat(String(v).replace(/[$,\u00a0\s]/g, '')) || 0;
  }
  function trim(v) { return v == null ? '' : String(v).trim(); }

  // Feature flags
  S.features.hasSeasonality = found.includes('Seasonality_Index') && sheet('Seasonality_Index').length > 0;
  S.features.hasChannelSeasonality = found.includes('Channel_Seasonality_Index') && sheet('Channel_Seasonality_Index').length > 0;
  S.features.hasPmixWeekly = found.includes('Brink_Pmix_Weekly_2026') && found.includes('Brink_Pmix_Weekly_2025') && sheet('Brink_Pmix_Weekly_2026').length > 0 && sheet('Brink_Pmix_Weekly_2025').length > 0;
  S.features.hasSalary = found.includes('Store_Salary') && sheet('Store_Salary').some(r => r.Period_Salary != null);

  // Weekly_Fact_Table
  S.data.weekly = sheet('Weekly_Fact_Table').map(r => ({
    weekEnd: r.Week_End, fw: num(r.Fiscal_Week), store: trim(r.Store_Name),
    type: trim(r.Analysis_Type), cat: trim(r.Category),
    sales: num(r.Sales), orders: num(r.Orders), avgCheck: num(r.Avg_Check),
    reviews: num(r.Reviews), costPct: numOrNull(r['Cost %']),
    avgRating: numOrNull(r.Avg_Rating),
    responseRate: (() => { const v = numOrNull(r.Response_Rate); return v != null && v > 1 ? v / 100 : v; })(),
    hoursWorked: numOrNull(r.Hours_Worked)
  }));
  S.data.availableWeeks = [...new Set(S.data.weekly.map(r=>r.fw))].sort((a,b)=>a-b);
  S.week = Math.max(...S.data.availableWeeks);

  // Budget_Fact_Table
  S.data.budget = sheet('Budget_Fact_Table').map(r => ({
    period: num(r.Fiscal_Period), store: trim(r.Store),
    budgetSales: num(r.Budget_Sales), budgetEbitdaPct: num(r.Budget_EBITDA_Pct),
    budgetFoodCostPct: num(r.Budget_Food_Cost_Pct), budgetLaborPct: num(r.Budget_Labor_Pct),
    budgetAllInLaborPct: num(r.Budget_All_In_Labor_Pct)
  }));

  // Brand_Weekly_History
  S.data.brandHistory = sheet('Brand_Weekly_History').map(r => ({
    weekEnd: r.Week_End, fiscalYear: num(r.Fiscal_Year), period: trim(r.Fiscal_Period),
    fw: num(r.Fiscal_Week), type: trim(r.Analysis_Type), cat: trim(r.Category),
    sales: num(r.Sales), orders: num(r.Orders)
  }));

  // Seasonality
  if (S.features.hasSeasonality) {
    S.data.seasonality = sheet('Seasonality_Index').map(r => ({
      fw: num(r.Fiscal_Week), period: trim(r.Fiscal_Period),
      salesIndex: num(r.Sales_Index), ordersIndex: num(r.Orders_Index),
      yearsInSample: num(r.Years_In_Sample)
    }));
  }
  if (S.features.hasChannelSeasonality) {
    S.data.channelSeasonality = sheet('Channel_Seasonality_Index').map(r => ({
      fw: num(r.Fiscal_Week), period: trim(r.Fiscal_Period), channel: trim(r.Channel),
      salesIndex: num(r.Sales_Index), ordersIndex: num(r.Orders_Index),
      yearsInSample: num(r.Years_In_Sample)
    }));
  }

  // PMIX Period
  S.data.pmixPeriod2026 = sheet('Brink_Pmix_Import_2026').map(r => ({
    period: trim(r.Period), item: trim(r['Item Name']),
    qty: num(r.Quantity), avgPrice: num(r['Average Price']),
    totalSales: num(r['Total Sales']), pct: num(r.Percent)
  }));
  S.data.pmixPeriod2025 = sheet('Brink_Pmix_Import_2025').map(r => ({
    period: trim(r.Period), item: trim(r['Item Name']),
    qty: num(r.Quantity), avgPrice: cleanCurrency(r['Average Price']),
    totalSales: cleanCurrency(r['Total Sales']), pct: num(r.Percent)
  }));

  // PMIX Weekly
  if (S.features.hasPmixWeekly) {
    S.data.pmixWeekly2026 = sheet('Brink_Pmix_Weekly_2026').map(r => ({
      fiscalYear: num(r['Fiscal Year']), period: num(r['Fiscal Period']),
      fw: num(r.Fiscal_Week), weekEnd: r['Week End'], item: trim(r['Item Name']),
      qty: num(r.Quantity), avgPrice: num(r['Average Price']),
      totalSales: num(r['Total Sales']), pct: num(r.Percent)
    }));
    S.data.pmixWeekly2025 = sheet('Brink_Pmix_Weekly_2025').map(r => ({
      fiscalYear: num(r['Fiscal Year']), period: num(r['Fiscal Period']),
      fw: num(r.Fiscal_Week), weekEnd: r['Week End'], item: trim(r['Item Name']),
      qty: num(r.Quantity), avgPrice: num(r['Average Price']),
      totalSales: num(r['Total Sales']), pct: num(r.Percent)
    }));
  }

  // Prior Year
  S.data.priorYear = sheet('Prior_Year_Fact_Table').map(r => ({
    period: num(r.Fiscal_Period), fiscalYear: num(r.Fiscal_Year),
    store: trim(r.Store), type: trim(r.Analysis_Type), cat: trim(r.Category),
    sales: num(r.Sales), orders: num(r.Orders), avgCheck: num(r.Avg_Check)
  }));

  // Store_List
  S.data.stores = sheet('Store_List').map(r => ({
    storeNumber: trim(r.Store_Number), name: trim(r.Store_Name), district: trim(r.District)
  }));
  // Update CONFIG districts from Excel
  const excelDistricts = {};
  S.data.stores.forEach(s => {
    if (!excelDistricts[s.district]) excelDistricts[s.district] = [];
    excelDistricts[s.district].push(s.name);
  });
  if (Object.keys(excelDistricts).length) CONFIG.districts = excelDistricts;

  // Fiscal_Calendar
  S.data.calendar = sheet('Fiscal_Calendar').map(r => ({
    period: trim(r.Period), week: num(r.Week), start: r.Start, end: r.End, fiscalYear: num(r.Fiscal_Year)
  }));
  const cal2026 = S.data.calendar.filter(r => r.fiscalYear === 2026);
  const wtp = {};
  cal2026.forEach(r => { wtp[r.week] = r.period; });
  S.data.weekToPeriod = wtp;
  S.data.availablePeriods = [...new Set(cal2026.map(r=>r.period))].sort((a,b) => {
    const na = parseInt(a.replace('P','')), nb = parseInt(b.replace('P',''));
    return na - nb;
  });
  S.data.currentPeriod = wtp[S.week] || S.data.availablePeriods[S.data.availablePeriods.length-1] || 'P1';
  S.menuPeriod = S.data.currentPeriod;

  // Store_Salary
  if (S.features.hasSalary) {
    const raw = sheet('Store_Salary');
    S.data.salary = raw.map(r => ({
      store: trim(r.Store_Name), period: num(r.Fiscal_Period),
      periodSalary: numOrNull(r.Period_Salary), payrollTax: numOrNull(r.Payroll_Tax)
    }));
  }

  // Show validation then compute
  showValidation(found);
  computeAll();

  // Show UI
  uploadZone.classList.add('hidden');
  document.getElementById('reloadBtn').style.display = 'inline-block';
  document.getElementById('districtFilter').style.display = 'flex';
  document.getElementById('weekSelectWrap').style.display = 'flex';
  document.getElementById('tabBar').style.display = 'flex';

  // Populate week selector
  const sel = document.getElementById('weekSelect');
  sel.innerHTML = '';
  S.data.availableWeeks.slice().reverse().forEach(w => {
    const per = S.data.weekToPeriod[w] || '';
    sel.innerHTML += `<option value="${w}" ${w===S.week?'selected':''}>${per} — W${w}</option>`;
  });

  // Auto-render after validation flash
  setTimeout(() => renderTab(), 2500);
}

function showValidation(found) {
  const allTabs = ['Weekly_Fact_Table','Budget_Fact_Table','Brand_Weekly_History','Prior_Year_Fact_Table','Store_List','Fiscal_Calendar','Seasonality_Index','Channel_Seasonality_Index','Brink_Pmix_Import_2026','Brink_Pmix_Import_2025','Brink_Pmix_Weekly_2026','Brink_Pmix_Weekly_2025','Store_Salary'];
  const storeNames = [...new Set(S.data.weekly.map(r=>r.store))];

  html += `<div class="row"><span class="label">Weekly_Fact_Table</span><span class="value">${S.data.weekly.length} rows, ${storeNames.length} stores, W${weeks[0]}–W${weeks[weeks.length-1]}</span></div>`;
  html += `<div class="row"><span class="label">Features</span><span class="value">Seasonality: ${S.features.hasSeasonality?'✓':'✗'} | Channel Seasonality: ${S.features.hasChannelSeasonality?'✓':'✗'} | Weekly PMIX: ${S.features.hasPmixWeekly?'✓':'✗'} | Salary: ${S.features.hasSalary?'P1 only':'✗'}</span></div>`;
  if (S.features.hasSalary) {
    html += '<div class="row"><span class="label warn">⚠ Note</span><span class="value">Store_Salary: only P1 populated — using P1 values for all periods</span></div>';

/* ═══════════════════════════════════════════════════════════════════
   SECTION 6 — COMPUTE ENGINE
   ═══════════════════════════════════════════════════════════════════ */
function computeAll() {
  const C = S.computed = {};
  const allStores = S.data.stores.map(s=>s.name);
  const weeks = S.data.availableWeeks;
  const curPeriod = S.data.currentPeriod;
  const curPeriodNum = parseInt(curPeriod.replace('P',''));
  const periodWeeks = weeks.filter(w => S.data.weekToPeriod[w] === curPeriod);
  const weeksElapsed = periodWeeks.length;
  const totalPeriodWeeks = CONFIG.weeksPerPeriod;

  // Helper: filter weekly rows
  function wRows(store, fw, type) {
    return S.data.weekly.filter(r => r.store === store && r.fw === fw && r.type === type);
  }
  function sumField(arr, field) { return arr.reduce((s,r) => s + (r[field]||0), 0); }

  // ── 6A: Store Totals ──
  C.storeTotals = {};
  allStores.forEach(store => {
    C.storeTotals[store] = {};
    weeks.forEach(fw => {
      const destRows = wRows(store, fw, 'Destination');
      const sales = sumField(destRows, 'sales');
      const orders = sumField(destRows, 'orders');
      const avgCheck = orders > 0 ? sales / orders : 0;

      // WoW
      const priorFw = fw - 1;
      let salesWoW = null, ordersWoW = null, checkWoW = null;
      let trafficContrib = null, checkContrib = null;
      if (C.storeTotals[store][priorFw]) {
        const p = C.storeTotals[store][priorFw];
        salesWoW = p.sales > 0 ? (sales - p.sales) / p.sales : null;
        ordersWoW = p.orders > 0 ? (orders - p.orders) / p.orders : null;
        checkWoW = p.avgCheck > 0 ? (avgCheck - p.avgCheck) / p.avgCheck : null;
        // Decomposition
        if (p.sales > 0) {
          const trafficEffect = (orders - p.orders) * p.avgCheck;
          const checkEffect = (avgCheck - p.avgCheck) * p.orders;
          const mixEffect = (orders - p.orders) * (avgCheck - p.avgCheck);
          const totalChange = sales - p.sales;
          trafficContrib = totalChange !== 0 ? (trafficEffect + mixEffect/2) / totalChange : 0;
          checkContrib = totalChange !== 0 ? (checkEffect + mixEffect/2) / totalChange : 0;
        }
      }

      // YoY (store-level: use prior year period-prorated)
      let salesYoY = null, ordersYoY = null, checkYoY = null;
      const pyRows = S.data.priorYear.filter(r => r.store === store && r.period === curPeriodNum && r.type === 'Destination');
      if (pyRows.length) {
        const pySales = sumField(pyRows, 'sales');
        const pyOrders = sumField(pyRows, 'orders');
        const pyWeekAvgSales = pySales / totalPeriodWeeks;
        const pyWeekAvgOrders = pyOrders / totalPeriodWeeks;
        if (pyWeekAvgSales > 0) salesYoY = (sales - pyWeekAvgSales) / pyWeekAvgSales;
        if (pyWeekAvgOrders > 0) ordersYoY = (orders - pyWeekAvgOrders) / pyWeekAvgOrders;
        const pyCheck = pyOrders > 0 ? pySales / pyOrders : 0;
        if (pyCheck > 0) checkYoY = (avgCheck - pyCheck) / pyCheck;
      }

      // Signal
      let signal = 'DECLINE';
      if (salesWoW != null && ordersWoW != null) {
        const su = salesWoW > 0.005, ou = ordersWoW > 0.005;
        if (su && ou) signal = 'BALANCED_GROWTH';
        else if (su && !ou) signal = 'CHECK_INFLATION';
        else if (!su && ou) signal = 'CHECK_EROSION';
      }

      C.storeTotals[store][fw] = {sales, orders, avgCheck, salesWoW, ordersWoW, checkWoW, salesYoY, ordersYoY, checkYoY, signal, trafficContrib, checkContrib};
    });
  });

  // ── 6B: Brand Totals ──
  C.brandTotals = {};
  weeks.forEach(fw => {
    let sales=0, orders=0;
    allStores.forEach(store => {
      const st = C.storeTotals[store]?.[fw];
      if (st) { sales += st.sales; orders += st.orders; }
    });
    const avgCheck = orders > 0 ? sales / orders : 0;
    const priorFw = fw - 1;
    let salesWoW=null, ordersWoW=null, checkWoW=null, trafficContrib=null, checkContrib=null;
    if (C.brandTotals[priorFw]) {
      const p = C.brandTotals[priorFw];
      salesWoW = p.sales > 0 ? (sales - p.sales) / p.sales : null;
      ordersWoW = p.orders > 0 ? (orders - p.orders) / p.orders : null;
      checkWoW = p.avgCheck > 0 ? (avgCheck - p.avgCheck) / p.avgCheck : null;
      if (p.sales > 0) {
        const te = (orders-p.orders)*p.avgCheck, ce = (avgCheck-p.avgCheck)*p.orders, me = (orders-p.orders)*(avgCheck-p.avgCheck);
        const tc = sales - p.sales;
        trafficContrib = tc !== 0 ? (te+me/2)/tc : 0;
        checkContrib = tc !== 0 ? (ce+me/2)/tc : 0;
      }
    }
    // YoY from Brand History
    const bh25 = S.data.brandHistory.filter(r => r.fiscalYear === 2025 && r.fw === fw && r.type === 'Destination');
    const sales2025 = sumField(bh25, 'sales'), orders2025 = sumField(bh25, 'orders');
    const check2025 = orders2025 > 0 ? sales2025 / orders2025 : 0;
    const salesYoY = sales2025 > 0 ? (sales - sales2025) / sales2025 : null;
    const ordersYoY = orders2025 > 0 ? (orders - orders2025) / orders2025 : null;
    const checkYoY = check2025 > 0 ? (avgCheck - check2025) / check2025 : null;
    let signal = 'DECLINE';
    if (salesWoW != null && ordersWoW != null) {
      const su = salesWoW > 0.005, ou = ordersWoW > 0.005;
      if (su && ou) signal = 'BALANCED_GROWTH'; else if (su && !ou) signal = 'CHECK_INFLATION'; else if (!su && ou) signal = 'CHECK_EROSION';
    }
    C.brandTotals[fw] = {sales, orders, avgCheck, salesWoW, ordersWoW, checkWoW, signal, trafficContrib, checkContrib, sales2025, orders2025, check2025, salesYoY, ordersYoY, checkYoY};
  });

  // ── 6C: District Totals ──
  C.districtTotals = {};
  Object.keys(CONFIG.districts).forEach(dist => {
    C.districtTotals[dist] = {};
    const dStores = CONFIG.districts[dist];
    weeks.forEach(fw => {
      let sales=0, orders=0;
      dStores.forEach(store => {
        const st = C.storeTotals[store]?.[fw];
        if (st) { sales += st.sales; orders += st.orders; }
      });
      const avgCheck = orders > 0 ? sales / orders : 0;
      const priorFw = fw - 1;
      let salesWoW=null, ordersWoW=null, checkWoW=null;
      if (C.districtTotals[dist][priorFw]) {
        const p = C.districtTotals[dist][priorFw];
        salesWoW = p.sales > 0 ? (sales-p.sales)/p.sales : null;
        ordersWoW = p.orders > 0 ? (orders-p.orders)/p.orders : null;
        checkWoW = p.avgCheck > 0 ? (avgCheck-p.avgCheck)/p.avgCheck : null;
      }
      let signal = 'DECLINE';
      if (salesWoW != null && ordersWoW != null) {
        const su = salesWoW > 0.005, ou = ordersWoW > 0.005;
        if (su && ou) signal = 'BALANCED_GROWTH'; else if (su && !ou) signal = 'CHECK_INFLATION'; else if (!su && ou) signal = 'CHECK_EROSION';
      }
      C.districtTotals[dist][fw] = {sales, orders, avgCheck, salesWoW, ordersWoW, checkWoW, signal};
    });
  });

  // ── 6D: Channel Breakdown ──
  C.channels = {};
  weeks.forEach(fw => {
    const dest = {}, dayp = {};
    const fwRows = S.data.weekly.filter(r => r.fw === fw);
    const destRows = fwRows.filter(r => r.type === 'Destination');
    const dayRows = fwRows.filter(r => r.type === 'Daypart');
    const totalOrders = destRows.reduce((s,r) => s + r.orders, 0);
    CONFIG.destinationChannels.forEach(ch => {
      const chRows = destRows.filter(r => r.cat === ch);
      const sales = sumField(chRows,'sales'), orders = sumField(chRows,'orders');
      const avgCheck = orders > 0 ? sales/orders : 0;
      const shareOfOrders = totalOrders > 0 ? orders/totalOrders : 0;
      // WoW
      let salesWoW=null, ordersWoW=null, checkWoW=null;
      if (C.channels[fw-1]?.destination?.[ch]) {
        const p = C.channels[fw-1].destination[ch];
        salesWoW = p.sales>0 ? (sales-p.sales)/p.sales : null;
        ordersWoW = p.orders>0 ? (orders-p.orders)/p.orders : null;
        checkWoW = p.avgCheck>0 ? (avgCheck-p.avgCheck)/p.avgCheck : null;
      }
      dest[ch] = {sales, orders, avgCheck, shareOfOrders, salesWoW, ordersWoW, checkWoW};
    });
    CONFIG.allDayparts.forEach(dp => {
      const dpRows = dayRows.filter(r => r.cat === dp);
      const sales = sumField(dpRows,'sales'), orders = sumField(dpRows,'orders');
      const avgCheck = orders > 0 ? sales/orders : 0;
      const shareOfOrders = totalOrders > 0 ? orders/totalOrders : 0;
      let salesWoW=null, ordersWoW=null;
      if (C.channels[fw-1]?.daypart?.[dp]) {
        const p = C.channels[fw-1].daypart[dp];
        salesWoW = p.sales>0 ? (sales-p.sales)/p.sales : null;
        ordersWoW = p.orders>0 ? (orders-p.orders)/p.orders : null;
      }
      dayp[dp] = {sales, orders, avgCheck, shareOfOrders, salesWoW, ordersWoW};
    });
    C.channels[fw] = {destination:dest, daypart:dayp};
  });

  // ── 6E: Store Channel Breakdown ──
  C.storeChannels = {};
  allStores.forEach(store => {
    C.storeChannels[store] = {};
    weeks.forEach(fw => {
      const dest = {}, dayp = {};
      const fwRows = S.data.weekly.filter(r => r.fw===fw && r.store===store);
      const destRows = fwRows.filter(r => r.type==='Destination');
      const dayRows = fwRows.filter(r => r.type==='Daypart');
      const storeChange = C.storeTotals[store][fw]?.sales - (C.storeTotals[store][fw-1]?.sales || 0);
      CONFIG.destinationChannels.forEach(ch => {
        const chRows = destRows.filter(r => r.cat===ch);
        const sales = sumField(chRows,'sales'), orders = sumField(chRows,'orders');
        let salesWoW=null, ordersWoW=null;
        const priorStore = C.storeChannels[store]?.[fw-1];
        if (priorStore?.destination?.[ch]) {
          const p = priorStore.destination[ch];
          salesWoW = p.sales>0 ? (sales-p.sales)/p.sales : null;
          ordersWoW = p.orders>0 ? (orders-p.orders)/p.orders : null;
        }
        const chChange = sales - (priorStore?.destination?.[ch]?.sales || sales);
        const contributionToStoreChange = storeChange !== 0 ? chChange / storeChange : 0;
        dest[ch] = {sales, orders, salesWoW, ordersWoW, contributionToStoreChange};
      });
      CONFIG.allDayparts.forEach(dp => {
        const dpRows = dayRows.filter(r => r.cat===dp);
        const sales = sumField(dpRows,'sales'), orders = sumField(dpRows,'orders');
        dayp[dp] = {sales, orders};
      });
      C.storeChannels[store][fw] = {destination:dest, daypart:dayp};
    });
  });

  // ── 6F: Guest Health Scores ──
  C.guestHealth = {};
  function interpolate(value, anchors) {
    if (value <= anchors[0].value) return anchors[0].score;
    if (value >= anchors[anchors.length-1].value) return anchors[anchors.length-1].score;
    for (let i = 0; i < anchors.length - 1; i++) {
      if (value >= anchors[i].value && value <= anchors[i+1].value) {
        const pct = (value - anchors[i].value) / (anchors[i+1].value - anchors[i].value);
        return anchors[i].score + pct * (anchors[i+1].score - anchors[i].score);
      }
    }
    return 0;
  }
  allStores.forEach(store => {
    C.guestHealth[store] = {};
    weeks.forEach(fw => {
      const revRows = S.data.weekly.filter(r => r.fw===fw && r.store===store && r.type==='Reviews');
      const ratingRow = revRows.find(r => r.cat==='Avg Rating');
      const lowRow = revRows.find(r => r.cat==='1-3 stars');
      const totalRow = revRows.find(r => r.cat==='Total Reviews');
      const respRow = revRows.find(r => r.cat==='Response Rate');
      const avgRating = ratingRow?.avgRating ?? 0;
      const lowReviews = lowRow?.reviews ?? 0;
      const totalReviews = totalRow?.reviews ?? 0;
      const responseRate = respRow?.responseRate ?? 0;
      if (avgRating === 0 && totalReviews === 0) { C.guestHealth[store][fw] = null; return; }
      const lowPct = totalReviews > 0 ? lowReviews / totalReviews : 0;
      const ratingScore = interpolate(avgRating, CONFIG.ratingAnchors);
      const lowPctScore = interpolate(lowPct, CONFIG.lowPctAnchors);
      const responseScore = lowReviews === 0 ? 10 : interpolate(responseRate, CONFIG.responseAnchors);
      const volumeBonus = totalReviews >= CONFIG.volumeBonusMedian * 0.5 ?
        Math.min(CONFIG.volumeBonusMax, (totalReviews / CONFIG.volumeBonusMedian) * CONFIG.volumeBonusMax) : 0;
      const rawTotal = ratingScore + lowPctScore + responseScore + volumeBonus;
      const raw = Math.round(rawTotal / 95 * 100);
      C.guestHealth[store][fw] = {
        raw, smoothed: raw, ptd: raw,
        components: {ratingScore, lowPctScore, responseScore, volumeBonus},
        data: {avgRating, lowReviews, totalReviews, lowPct, responseRate}
      };
    });
    // Smoothing
    weeks.forEach(fw => {
      if (!C.guestHealth[store][fw]) return;
      const vals = [], wts = [];
      for (let i = 0; i < 3; i++) {
        const g = C.guestHealth[store][fw - i];
        if (g) { vals.push(g.raw); wts.push(CONFIG.smoothingWeights[i]); }
      }
      if (vals.length) {
        const totalW = wts.reduce((a,b)=>a+b,0);
        C.guestHealth[store][fw].smoothed = Math.round(vals.reduce((s,v,i) => s + v * wts[i], 0) / totalW);
      }
    });
    // PTD
    const ptdWeeks = weeks.filter(w => S.data.weekToPeriod[w] === curPeriod);
    const ptdScores = ptdWeeks.map(w => C.guestHealth[store][w]?.raw).filter(v => v != null);
    const ptd = ptdScores.length ? Math.round(ptdScores.reduce((a,b)=>a+b,0) / ptdScores.length) : null;
    ptdWeeks.forEach(w => { if (C.guestHealth[store][w]) C.guestHealth[store][w].ptd = ptd; });
  });

  // ── 6H: Budget Pacing ──
  C.budgetPacing = {};
  allStores.forEach(store => {
    const budgetRow = S.data.budget.find(b => b.store === store && b.period === curPeriodNum);
    const ptdSales = periodWeeks.reduce((s,w) => s + (C.storeTotals[store][w]?.sales || 0), 0);
    const periodBudget = budgetRow?.budgetSales || 0;
    const variance = ptdSales - periodBudget * (weeksElapsed / totalPeriodWeeks);
    const variancePct = periodBudget > 0 ? variance / (periodBudget * (weeksElapsed / totalPeriodWeeks)) : 0;
    const weeksRemaining = totalPeriodWeeks - weeksElapsed;
    const weeklyRunRateNeeded = weeksRemaining > 0 ? (periodBudget - ptdSales) / weeksRemaining : 0;
    const onPace = ptdSales >= (periodBudget / totalPeriodWeeks * weeksElapsed);
    // Prior year PTD
    const pyRows = S.data.priorYear.filter(r => r.store===store && r.period===curPeriodNum && r.type==='Destination');
    const pyTotal = sumField(pyRows, 'sales');
    const priorYearPTD = pyTotal * (weeksElapsed / totalPeriodWeeks);
    C.budgetPacing[store] = {period:curPeriod, ptdSales, periodBudget, variance, variancePct, weeksElapsed, weeksRemaining, weeklyRunRateNeeded, onPace, priorYearPTD};
  });

  // ── 6I: Controllable Costs ──
  C.costs = {};
  allStores.forEach(store => {
    C.costs[store] = {};
    const budgetRow = S.data.budget.find(b => b.store===store && b.period===curPeriodNum);
    weeks.forEach(fw => {
      const costRows = S.data.weekly.filter(r => r.fw===fw && r.store===store && r.type==='Controllable Cost');
      const foodRow = costRows.find(r => r.cat==='Food Cost');
      const laborRow = costRows.find(r => r.cat==='Labor Cost');
      const hoursRow = costRows.find(r => r.cat==='Hours Worked');
      const foodCostPct = foodRow?.costPct ?? null;
      const laborCostPct = laborRow?.costPct ?? null;
      const hoursWorked = hoursRow?.hoursWorked ?? null;
      const storeSales = C.storeTotals[store][fw]?.sales || 0;
      const splh = hoursWorked > 0 ? storeSales / hoursWorked : null;
      const bfcp = budgetRow?.budgetFoodCostPct ?? null;
      const blp = budgetRow?.budgetLaborPct ?? null;
      const bailp = budgetRow?.budgetAllInLaborPct ?? null;
      const foodCostVariancePct = (foodCostPct != null && bfcp != null) ? foodCostPct - bfcp : null;
      const foodCostVarianceDollars = (foodCostVariancePct != null) ? foodCostVariancePct * storeSales : null;
      const laborCostVariancePct = (laborCostPct != null && blp != null) ? laborCostPct - blp : null;
      const laborCostVarianceDollars = (laborCostVariancePct != null) ? laborCostVariancePct * storeSales : null;
      C.costs[store][fw] = {foodCostPct, laborCostPct, hoursWorked, splh, budgetFoodCostPct:bfcp, budgetLaborPct:blp, budgetAllInLaborPct:bailp, foodCostVariancePct, foodCostVarianceDollars, laborCostVariancePct, laborCostVarianceDollars};
    });
  });

  // ── 6G: Composite Rankings ──
  C.rankings = {};
  weeks.forEach(fw => {
    const ranked = allStores.map(store => {
      const st = C.storeTotals[store][fw];
      if (!st) return {store, district: storeDistrict(store), compositeScore:0, rank:99, dimensions:{}};

      // Sales Momentum (0-20)
      let smWoW = 0;
      if (st.salesWoW != null) smWoW = interpLinear(st.salesWoW, [[-0.10,0],[-0.05,3],[0,6],[0.05,9],[0.10,12]]);
      let smTrend = 0;
      let consUp = 0;
      for (let i = 0; i < 3; i++) {
        const prev = C.storeTotals[store][fw-i];
        if (prev && prev.salesWoW > 0.005) consUp++; else break;
      }
      if (consUp >= 3) smTrend = 8; else if (consUp >= 2) smTrend = 5; else if (consUp >= 1) smTrend = 3;
      const salesMomentum = Math.min(20, smWoW + smTrend);

      // Traffic Direction (0-25)
      let tdWoW = 0;
      if (st.ordersWoW != null) tdWoW = interpLinear(st.ordersWoW, [[-0.10,0],[-0.05,3],[0,7.5],[0.05,11],[0.10,15]]);
      let consOrderUp = 0;
      for (let i = 0; i < 3; i++) {
        const prev = C.storeTotals[store][fw-i];
        if (prev && prev.ordersWoW > 0.005) consOrderUp++; else break;
      }
      let tdCons = 0;
      if (consOrderUp >= 3) tdCons = 10; else if (consOrderUp >= 2) tdCons = 7; else if (consOrderUp >= 1) tdCons = 4;
      const trafficDirection = Math.min(25, Math.max(0, tdWoW + tdCons));

      // Cost Discipline (0-20)
      const cost = C.costs[store][fw];
      let foodPts = 10, laborPts = 10;
      if (cost?.foodCostPct != null && cost.budgetFoodCostPct != null) {
        const overBudget = cost.foodCostPct - cost.budgetFoodCostPct;
        foodPts = overBudget <= 0 ? 10 : Math.max(0, 10 - overBudget * 100 * 3);
      }
      if (cost?.laborCostPct != null && cost.budgetAllInLaborPct != null) {
        const overBudget = cost.laborCostPct - cost.budgetAllInLaborPct;
        laborPts = overBudget <= 0 ? 10 : Math.max(0, 10 - overBudget * 100 * 3);
      }
      const costDiscipline = Math.min(20, foodPts + laborPts);

      // Guest Health (0-15)
      const gh = C.guestHealth[store][fw];
      const guestHealthScore = gh ? Math.round(gh.smoothed / 100 * 15) : 8;

      // Budget Pace (0-20)
      const bp = C.budgetPacing[store];
      let budgetPace = 20;
      if (bp && bp.periodBudget > 0) {
        const paceRatio = bp.ptdSales / (bp.periodBudget / totalPeriodWeeks * weeksElapsed);
        if (paceRatio < 1) budgetPace = Math.max(0, 20 - (1 - paceRatio) * 100);
      }

      const compositeScore = Math.round(salesMomentum + trafficDirection + costDiscipline + guestHealthScore + budgetPace);
      return {store, district: storeDistrict(store), compositeScore, dimensions: {salesMomentum:Math.round(salesMomentum), trafficDirection:Math.round(trafficDirection), costDiscipline:Math.round(costDiscipline), guestHealth:guestHealthScore, budgetPace:Math.round(budgetPace)}};
    });
    ranked.sort((a,b) => b.compositeScore - a.compositeScore);
    ranked.forEach((r,i) => r.rank = i + 1);
    C.rankings[fw] = ranked;
  });

  // ── 6J: Alerts ──
  C.alerts = [];
  allStores.forEach(store => {
    const fw = S.week;
    const st = C.storeTotals[store][fw];
    if (!st) return;
    const triggers = [];
    // Consecutive order declines
    let consDecline = 0;
    for (let i = 0; i < 4; i++) {
      const prev = C.storeTotals[store][fw-i];
      if (prev && prev.ordersWoW != null && prev.ordersWoW < -0.005) consDecline++; else break;
    }
    if (consDecline >= CONFIG.thresholds.consecutiveOrderDeclineWeeks) triggers.push({type:'orderDecline', severity:'red', detail:`Orders down ${consDecline} consecutive weeks`});

    // Guest health
    const gh = C.guestHealth[store][fw];
    if (gh && gh.smoothed < CONFIG.thresholds.guestScoreRed) triggers.push({type:'guestHealth', severity:'red', detail:`Guest health score ${gh.smoothed} (below ${CONFIG.thresholds.guestScoreRed})`});
    else if (gh) {
      const prevGh = C.guestHealth[store][fw-1];
      if (prevGh && prevGh.smoothed >= CONFIG.thresholds.guestScoreGreen && gh.smoothed < CONFIG.thresholds.guestScoreGreen) {
        triggers.push({type:'guestHealth', severity:'yellow', detail:`Guest health dropped from ${prevGh.smoothed} to ${gh.smoothed}`});
      }
    }

    // Food cost
    const cost = C.costs[store][fw];
    if (cost?.foodCostVariancePct != null) {
      if (cost.foodCostVariancePct > CONFIG.thresholds.foodCostOverBudgetPct) triggers.push({type:'foodCost', severity:'red', detail:`Food cost ${fmtPct(cost.foodCostPct)} vs budget ${fmtPct(cost.budgetFoodCostPct)}`});
      else if (cost.foodCostVariancePct > 0.01) triggers.push({type:'foodCost', severity:'yellow', detail:`Food cost ${fmtPct(cost.foodCostPct)} slightly over budget`});
    }

    // Budget pace
    const bp = C.budgetPacing[store];
    if (bp && bp.periodBudget > 0 && bp.variancePct < -0.10) triggers.push({type:'budgetPace', severity:'red', detail:`Sales ${fmtPct(Math.abs(bp.variancePct))} below budget pace`});

    // Causal decomposition
    let causal = '';
    const sc = C.storeChannels[store][fw];
    if (sc && st.salesWoW < -0.005) {
      const chContribs = CONFIG.destinationChannels.map(ch => ({ch, contrib: sc.destination[ch]?.contributionToStoreChange || 0, change: (sc.destination[ch]?.sales || 0) - (C.storeChannels[store][fw-1]?.destination?.[ch]?.sales || sc.destination[ch]?.sales || 0)}));
      chContribs.sort((a,b) => Math.abs(b.contrib) - Math.abs(a.contrib));
      const top = chContribs[0];
      if (top && Math.abs(top.contrib) > 0.2) causal = `${top.ch} contributed ${fmtPct(Math.abs(top.contrib))} of the change`;
    }

    // Dollar impact for red
    let dollarImpact = null;
    if (bp && bp.weeksRemaining > 0) {
      const weeklyBudgetPace = bp.periodBudget / totalPeriodWeeks;
      dollarImpact = (weeklyBudgetPace - st.sales) * bp.weeksRemaining;
      if (dollarImpact < 0) dollarImpact = null;
    }

    const redCount = triggers.filter(t => t.severity === 'red').length;
    const yellowCount = triggers.filter(t => t.severity === 'yellow').length;
    let severity = 'green';
    if (redCount >= 2 || (redCount >= 1 && yellowCount >= 1)) severity = 'red';
    else if (redCount >= 1 || yellowCount >= 1) severity = 'yellow';

    const headline = triggers.length ? triggers[0].detail : 'Performing normally';
    const detail = causal || (triggers.length > 1 ? triggers.slice(1).map(t=>t.detail).join('; ') : '');
    C.alerts.push({store, district: storeDistrict(store), severity, headline, detail, dollarImpact: severity==='red' ? dollarImpact : null, leadingIndicators: triggers.map(t=>t.type)});
  });
  C.alerts.sort((a,b) => {const ord = {red:0,yellow:1,green:2}; return (ord[a.severity]-ord[b.severity]) || ((b.dollarImpact||0)-(a.dollarImpact||0)); });

  // ── 6K: Seasonality Context ──
  C.seasonality = {};
  if (S.features.hasSeasonality) {
    const bh25Dest = S.data.brandHistory.filter(r => r.fiscalYear === 2025 && r.type === 'Destination');
    const annualSales = bh25Dest.reduce((s,r) => s + r.sales, 0);
    const brandWeeklyAvg = annualSales / 52;
    weeks.forEach(fw => {
      const si = S.data.seasonality.find(r => r.fw === fw);
      if (!si) { C.seasonality[fw] = null; return; }
      const expected = brandWeeklyAvg * si.salesIndex;
      const actual = C.brandTotals[fw]?.sales || 0;
      const vs = expected > 0 ? (actual - expected) / expected : 0;
      C.seasonality[fw] = {salesIndex:si.salesIndex, ordersIndex:si.ordersIndex, vsSeasonalSales:vs, vsSeasonalOrders:0,
        narrative: `Week ${fw} indexes at ${si.salesIndex.toFixed(2)}x — performing ${fmtChg(vs)} vs seasonal expectation`};
    });
  }

  // ── 6L: PMIX ──
  C.pmix = {attachmentRates:{}, revenueArchitecture:{}, plateMigration:{}, valueMix:{}};
  function classifyItem(name) {
    const lc = name.toLowerCase();
    for (const [cat, keywords] of Object.entries(CONFIG.itemClassifier)) {
      if (keywords.some(kw => lc.includes(kw))) return cat;
    }
    return 'UNCATEGORIZED';
  }
  // Attachment rates by week (if weekly pmix available)
  if (S.features.hasPmixWeekly) {
    const plateShareTrend = [], valueShareTrend = [];
    weeks.forEach(fw => {
      const items = S.data.pmixWeekly2026.filter(r => r.fw === fw);
      const cats = {};
      items.forEach(r => {
        const cat = classifyItem(r.item);
        if (!cats[cat]) cats[cat] = {qty:0, sales:0};
        cats[cat].qty += r.qty; cats[cat].sales += r.totalSales;
      });
      const entreeQty = (cats.ENTREE_PLATE?.qty||0) + (cats.ENTREE_SANDWICH?.qty||0) + (cats.ENTREE_VALUE?.qty||0) + (cats.ENTREE_OTHER?.qty||0);
      const sideRate = entreeQty > 0 ? (cats.SIDE?.qty||0) / entreeQty : 0;
      const dessertRate = entreeQty > 0 ? (cats.DESSERT?.qty||0) / entreeQty : 0;
      const drinkRate = entreeQty > 0 ? (cats.DRINK?.qty||0) / entreeQty : 0;
      C.pmix.attachmentRates[fw] = {sideRate, dessertRate, drinkRate, entreeCount:entreeQty};
      const totalQty = Object.values(cats).reduce((s,c)=>s+c.qty,0);
      if (totalQty > 0) { plateShareTrend.push({fw, share:(cats.ENTREE_PLATE?.qty||0)/totalQty}); valueShareTrend.push({fw, share:(cats.ENTREE_VALUE?.qty||0)/totalQty}); }
    });
    C.pmix.valueMix = {plateShareTrend, valueShareTrend};
  }
  // Revenue architecture by period
  S.data.availablePeriods.forEach(per => {
    const items = S.data.pmixPeriod2026.filter(r => r.period === per);
    const arch = {};
    let totalSales = 0;
    items.forEach(r => {
      const cat = classifyItem(r.item);
      if (!arch[cat]) arch[cat] = {qty:0, sales:0, pct:0};
      arch[cat].qty += r.qty; arch[cat].sales += r.totalSales;
      totalSales += r.totalSales;
    });
    Object.values(arch).forEach(c => c.pct = totalSales > 0 ? c.sales / totalSales : 0);
    C.pmix.revenueArchitecture[per] = arch;
  });

  // ── 6M: Brand History Aggregation ──
  C.brandHistory2025 = {};
  C.brandHistory2026 = {};
  S.data.brandHistory.filter(r => r.type === 'Destination').forEach(r => {
    const target = r.fiscalYear === 2025 ? C.brandHistory2025 : r.fiscalYear === 2026 ? C.brandHistory2026 : null;
    if (!target) return;
    if (!target[r.fw]) target[r.fw] = {sales:0, orders:0};
    target[r.fw].sales += r.sales; target[r.fw].orders += r.orders;
  });
  Object.values(C.brandHistory2025).forEach(w => w.avgCheck = w.orders > 0 ? w.sales / w.orders : 0);
  Object.values(C.brandHistory2026).forEach(w => w.avgCheck = w.orders > 0 ? w.sales / w.orders : 0);

  // ── 6K: EBITDA Components ──
  C.ebitda = {};
  S.data.availablePeriods.forEach(per => {
    const perNum = parseInt(per.replace('P',''));
    const perWeeks = weeks.filter(w => S.data.weekToPeriod[w] === per);
    if (!perWeeks.length) return;
    let revenue=0, foodCostDollars=0, laborCostDollars=0, totalSalaryCost=0, totalPayrollTax=0;
    allStores.forEach(store => {
      const storePtdSales = perWeeks.reduce((s,w) => s + (C.storeTotals[store][w]?.sales||0), 0);
      revenue += storePtdSales;
      // Food cost
      const fcPcts = perWeeks.map(w => C.costs[store][w]?.foodCostPct).filter(v => v!=null);
      const avgFc = fcPcts.length ? fcPcts.reduce((a,b)=>a+b,0)/fcPcts.length : 0;
      foodCostDollars += storePtdSales * avgFc;
      // Labor cost (hourly)
      const lcPcts = perWeeks.map(w => C.costs[store][w]?.laborCostPct).filter(v => v!=null);
      const avgLc = lcPcts.length ? lcPcts.reduce((a,b)=>a+b,0)/lcPcts.length : 0;
      const hourlyLabor = storePtdSales * avgLc;
      laborCostDollars += hourlyLabor;
      // Salary
      let salaryRow = S.data.salary.find(r => r.store===store && r.period===perNum && r.periodSalary!=null);
      if (!salaryRow) salaryRow = S.data.salary.find(r => r.store===store && r.periodSalary!=null);
      const periodSalary = salaryRow?.periodSalary || 0;
      const taxRate = salaryRow?.payrollTax ?? CONFIG.defaultPayrollTaxRate;
      totalSalaryCost += periodSalary;
      totalPayrollTax += (hourlyLabor + periodSalary) * taxRate;
    });
    const allInLabor = laborCostDollars + totalSalaryCost + totalPayrollTax;
    const budgetRows = S.data.budget.filter(b => b.period===perNum);
    const budgetRevenue = budgetRows.reduce((s,b)=>s+b.budgetSales,0);
    const budgetEbitdaPct = budgetRows.length ? budgetRows.reduce((s,b)=>s+b.budgetEbitdaPct,0)/budgetRows.length : 0;
    C.ebitda[per] = {revenue, foodCost:foodCostDollars, laborCostHourly:laborCostDollars, salaryCost:totalSalaryCost, payrollTax:totalPayrollTax, allInLabor,
      ebitda:0, ebitdaPct:0, budgetEbitdaPct, budgetRevenue};
  });
}

// Helper
function storeDistrict(store) {
  for (const [d, stores] of Object.entries(CONFIG.districts)) { if (stores.includes(store)) return d; }
  return 'Unknown';
}
function interpLinear(value, anchors) {
  if (value <= anchors[0][0]) return anchors[0][1];
  if (value >= anchors[anchors.length-1][0]) return anchors[anchors.length-1][1];
  for (let i = 0; i < anchors.length - 1; i++) {
    if (value >= anchors[i][0] && value <= anchors[i+1][0]) {
      const pct = (value - anchors[i][0]) / (anchors[i+1][0] - anchors[i][0]);
      return anchors[i][1] + pct * (anchors[i+1][1] - anchors[i][1]);
    }
  }
  return 0;
}
function getStores() {
  if (S.district === 'All') return S.data.stores.map(s=>s.name);
  return CONFIG.districts[S.district] || [];
}
function getAgg(fw) {
  if (S.district === 'All') return S.computed.brandTotals[fw];
  return S.computed.districtTotals[S.district]?.[fw];
}

function dimensionBar(score, max) {
  if (score == null) return '<span style="color:var(--muted)">—</span>';
  const pct = Math.round(score / max * 100);
  const color = pct >= 70 ? 'var(--green)' : pct >= 40 ? 'var(--yellow)' : 'var(--red)';
  return `<div class="dim-bar"><div class="dim-track"><div class="dim-fill" style="width:${pct}%;background:${color}"></div></div><span class="dim-score">${Math.round(score)}</span></div>`;
}

function buildDecompSentence(agg) {
  if (!agg || agg.salesWoW == null) return '<div class="decomp-sentence" style="color:var(--muted)">First week — no prior week comparison available.</div>';
  const dir = agg.salesWoW >= 0 ? 'up' : 'down';
  const pct = (Math.abs(agg.salesWoW) * 100).toFixed(1);
  const tPct = agg.trafficContrib != null ? Math.round(Math.abs(agg.trafficContrib) * 100) : '—';
  const cPct = agg.checkContrib != null ? Math.round(Math.abs(agg.checkContrib) * 100) : '—';
  const sig = signalLabel(agg.signal);
  return `<div class="decomp-sentence">Sales ${dir} ${pct}% WoW — traffic contributed ${tPct}%, check contributed ${cPct}% → <span style="color:${sig.color};font-weight:700">${sig.label}</span></div>`;
}

function countSignals(stores, fw) {
  const counts = { BALANCED_GROWTH: 0, CHECK_INFLATION: 0, CHECK_EROSION: 0, DECLINE: 0 };
  stores.forEach(store => {
    const st = S.computed.storeTotals[store]?.[fw];
    if (st?.signal) counts[st.signal]++;
  });
  return counts;
}

function formatSignalDist(counts) {
  const labels = [
    { key: 'BALANCED_GROWTH', abbr: 'BG', color: 'var(--green)' },
    { key: 'CHECK_INFLATION', abbr: 'CI', color: 'var(--yellow)' },
    { key: 'CHECK_EROSION', abbr: 'CE', color: 'var(--blue)' },
    { key: 'DECLINE', abbr: 'D', color: 'var(--red)' }
  ];
  return labels.filter(l => counts[l.key] > 0).map(l => `<span style="color:${l.color};font-weight:600">${counts[l.key]} ${l.abbr}</span>`).join(', ');
}

function buildNarrative(store, fw) {
  const st = S.computed.storeTotals[store]?.[fw];
  const rank = (S.computed.rankings[fw] || []).find(r => r.store === store);
  const bp = S.computed.budgetPacing[store];
  const gh = S.computed.guestHealth[store]?.[fw];
  const sig = st ? signalLabel(st.signal) : {label:'—',color:'var(--muted)'};
  if (!rank || !st) return `<em>No data available for ${store} in week ${fw}.</em>`;

  let narrative = `${store} is ranked ${ordinal(rank.rank)} this week`;
  const prevRank = (S.computed.rankings[fw-1] || []).find(r => r.store === store);
  if (prevRank) {
    if (rank.rank < prevRank.rank) narrative += `, up from ${ordinal(prevRank.rank)} last week`;
    else if (rank.rank > prevRank.rank) narrative += `, down from ${ordinal(prevRank.rank)} last week`;
  }
  narrative += `. `;
  narrative += `${sig.label} pattern — `;
  if (st.signal === 'BALANCED_GROWTH') narrative += 'sales and orders both trending positive.';
  else if (st.signal === 'CHECK_INFLATION') narrative += 'sales growing from check increases but traffic softening.';
  else if (st.signal === 'CHECK_EROSION') narrative += 'traffic growing but spending per fan declining.';
  else narrative += 'both sales and traffic declining.';
  if (bp) {
    if (bp.onPace) narrative += ` On pace to exceed period budget by ${fmt$(Math.abs(bp.variance))}.`;
    else narrative += ` Behind budget pace — needs ${fmt$(bp.weeklyRunRateNeeded)}/week to close the gap.`;
  }
  return narrative;
}

    ],
    rows: rankData.map(r => {
      const st = S.computed.storeTotals[r.store]?.[fw] || {};
      const gh = S.computed.guestHealth[r.store]?.[fw];
      return {store:r.store, district:r.district, rank:r.rank, sales:st.sales, salesWoW:st.salesWoW, orders:st.orders, ordersWoW:st.ordersWoW, avgCheck:st.avgCheck, guestScore:gh?.smoothed, signal:st.signal};
    }),
